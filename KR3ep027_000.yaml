body:
  text: 中風今年風木司天春夏陽升之候兼因平昔怒勞憂思以致五志氣火交併於上肝膽內風鼓動盤旋上盛則下虛故足膝無力肝木內風壯火乘襲胃土胃主肌肉脈絡應肢繞出環口故唇舌麻木肢節如痿固為中厥之萌觀河間內火召風之論都以苦降辛泄少佐微酸最合經旨折其上騰之威使清空諸竅毋使濁痰壯火矇蔽乃用藥之權衡也至於頤養工夫寒暄保攝尤當加意於藥餌之先金石斛化橘紅北秦皮草決明冬桑葉白蒺藜嫩鉤藤生白芍又前議苦辛酸降一法肝風胃陽已折其上引之威故諸症亦覺小愈雖曰治標正合歲氣節候而設思夏至一陰來復高年本病預宜持護自來中厥最防於暴寒驟加致身中陰陽兩不接續耳議得攝納肝腎真氣補益上虛本病九制熟地肉蓯蓉生虎脛骨淮牛膝制首烏川萆薢川石斛赤白茯苓柏子霜黑穭豆皮立冬後三日診得左脈小絃動數右手和平略虛問得春夏平安交秋後有頭暈左目流淚足痿無力不能行走舌生紅剌微咳有痰此皆今年天氣大熱已久熱則真氣泄越虛則內風再旋經言痿生大熱熱耗津液而舌剌咳嗽流淚者風陽升於上也上則下焦無氣矣故補肝腎以攝納腎氣為要而清上安下其在甘涼不傷脾胃者宜之制首烏杞子天冬茺蔚子黃甘菊黑穭豆皮茯苓川石斛虎骨膠離愁菀結都系情志中自病恰逢冬溫陽氣不潛初交春令陽已勃然變化內風遊行擾絡陽但上冒陰不下吸清竅為蒙狀如中厥舌喑不言劉河間謂將息失宜火盛水衰風自內起其實陰虛陽亢為病也既不按法論病設治至驚蟄雷鳴身即汗泄春分氣暖而晝夜寤不肯寐甚至焦煩迥異於平時何一非陽氣獨激使然耶夫肝風內擾陽明最當其衝犯病中暴食以內風消爍求助於食今胃脈不復氣愈不振不司束筋骨以利機關致鼻準光亮肌肉浮腫考古人虛風首推侯氏黑散務以填實腸胃空隙庶幾內風可息奈何醫者不曰清火豁痰即曰膩補或雜風藥內因之恙豈有形質可攻偏寒偏熱皆非至理生牡蠣生白芍炒生地菊花炭炙甘草南棗肉嗔怒動陽恰值春木司升厥陰內風乘陽明脈絡之虛上凌咽喉環繞耳後清空之地升騰太過脂液無以營養四末而指節為之麻木是皆痱中根萌所謂下虛上實多致巔頂之疾夫情志變蒸之熱閲方書無芩連苦降羌防辛散之理肝為剛臟非柔潤不能調和也鮮生地元參心桑葉丹皮羚羊角連翹心脈濡無熱厥後右肢偏痿口喎舌歪聲音不出此陰風濕晦中於脾絡加以寒滯湯藥蔽其清陽致清氣無由展舒法宗古人星附六君子湯益氣仍能攻風祛痰若曰風中廉泉乃任脈為病與太陰脾絡有間矣人參茯苓新會皮香附汁南星薑汁炒竹節白附子薑汁炒痛從腿肢筋骨上又腰腹貫於心胸若平日經來帶下其症亦至此素稟陰虧衝任奇脈空曠凡春交地中陽氣升舉虛人氣動隨升絡血失養諸氣橫逆面赤如赭飢不欲食耳失聰寤不成寐陽浮脈絡交空顯然先和陽治絡細生地生白芍生鱉甲生龜甲生虎骨糯稻根滋腎丸脈弦小數形體日瘦口舌麋碎肩背掣痛肢節麻木膚腠瘙癢目眩暈耳鳴已有數年此屬操持積勞陽升內風旋動爍筋損液古謂壯火食氣皆陽氣之化先擬清血分中熱繼當養血熄其內風安靜勿勞不致痿厥生地元參天冬丹參犀角羚羊角連翹竹葉心年歲壯盛腕有氣瘕噯噫震動氣降乃平流痰未愈睪丸腫硬今人夜將寐少腹氣衝至心竟夕但寤不寐頭眩目花耳內風雷四肢麻痹肌腠如剌如蟲行此屬操持怒勞內損乎肝致少陽上聚為瘕厥陰下結為疝衝脈不靜脈中氣逆混擾氣燥熱化風陽交動營液日耗變亂種種總是肝風之害非攻消溫補能治惟以靜養勿加怒勢半年可望有成阿膠細生地天冬茯神陳小麥南棗肉頭痛神煩忽然而至五行之速莫如風火然有虛實內外之因非徒發散苦寒為事矣如向有肝病目疾喪明是陰氣久傷體質今厥陰風木司天春深發泄陽氣暴張即外感而論正內經冬不藏精春病必溫育陰可使熱清大忌發散蓋陰根久傷表之再傷陽劫陰液仲景謂一逆尚引日再逆促命期矣余前主阿膠雞子黃湯佐地冬壯水芍甘培土亟和其厥陽沖逆之威鹹味入陰甘緩其急與內經肝病三法恰合今已入夏三日虛陽倏上煩躁頭痛當大滋腎母以蘇肝子補胃陰以杜木火乘侮旬日不致反復經月可望全好人參熟地麥冬天冬龜膠阿膠五味茯神此痿厥也蓋厥陰風旋陽冒神迷則為厥陽明絡空四末不用而為痿厥午後黃昏乃厥陰陽明旺時病機發現矣凡此皆屬絡病金匱篇中有之仲景云諸厥宜下下之利不止者死明示下降之藥皆可止厥但不可硝黃再傷陰陽耳但積年沉疴非旦夕速效可知矣活鱉甲真阿膠方諸水鮮生地元參青黛平昔腸紅陰絡久傷左脅下宿瘕肝家風氣易結形瘦面青陰虛陽氣易冒血絡不得凝靜諸陽一併遂為厥沖氣自下犯胃為厄症似蓄血為狂奈脈細徑咽喉皆痛真陰枯槁之象水液無有風木大震此剛劑強鎮不能息其厥冒耳生雞子黃真阿膠淡菜龜板熱童便脈上左部稍振水虧木中風動左牙痛蓋風從內旋乃陽之化風只以春深地氣上升之候多升少降無非下元不司收納虛症何疑況因目恙頻用韭子煙燻查本草藥性辛辣升騰助陽孫真人於遺濁用之藉其升陽以涵陰更無漏泄耳今痱中八日聲音漸振者乃精氣略有寧靜里竅略有靈機是順境也乃不明此理仍用辛以泄氣加人參亦是清散上焦之藥以肝腎藏虛在於至陰若再投辛以傷其陰必致虛症峰起焉望其向安倘必以上有火熱古稱實火宜清虛火宜補溫養柔和與溫熱剛燥迥異幸勿疑訝生地川斛麥冬茯神阿膠女貞子脈左細數而徑右數大而虛此腎精肝血內虧水不涵木陽挾內風暴起莫制指臂拘攣口目喎邪在左蓋肝風陽氣從左而升沖氣撞心消渴暈厥仲景列於厥陰篇中凡肝屬陰木必犯胃之陽土飲食熱氣入胃引動肝腸即病發矣此恙已六七年陰損已極必屏絶俗擾怡悅情懷然後滋養堪固其陰必有小效無期速功炒鬆熟地陳阿膠大淡菜萸肉五味芡實金櫻子粉右瘓舌喑足痱頭重面載陽呵缺微厄診脈小濡而緩此腎納失司肝風震突但病起耳後暴腫必兼溫熱客氣清上輕揚腫勢頗減七日以來當陰陽經氣一小周天不必以時邪引病為惑昔河間宣明方論中謂舌強難言其咎在乎舌下經脈不主流動以腎脈縈及舌本耳其主地黃飲子取意濁藥清投機關漸靈並無礙乎上氣痰熱仿此法熟地肉蓯蓉遠志川石斛茯神枸杞子牛膝石菖蒲年前肝風眩暈主以涼血分利陽熄風一年未發今歲正月春寒非比天暖開紲此番病發必因勞恐觸動情志至於嘔逆微冷倏熱交醜寅漸作耳鳴咽痹食納久留脘中想少陽木火盛於寅膽脈貫耳犯逆之威必向陽明而後上憑諸竅脈右澀大胃逆不降食味不甘而脘中逆亂熏蒸日熾營血內耗無以養心斯寢不肯寐心搖蕩漾有難以鳴狀之象今頭重脘痹全是上為木火升騰阻遏清陽前方滋清血藥居多必不奏功今議湯劑方以苦降其逆辛通其痹然湯宜小其制度以久病體虛初春若此冬藏未為堅固可知其丸劑界以局方龍薈丸暫服半月再議連翹黑梔皮羚羊角鮮菊葉紫菀鬱金大杏仁土栝蔞皮鮮菖蒲根粵東地卑多濕陽氣多紲宦遊十載恰已五旬中年二氣不及壯盛堅固眩暈汗出乃陽不潛藏變化內風擾動虛靈所致內經藏象謂腎為根本左右有二蓋一陰一陽互相交紐水中有火為生生化育惟藏蓄不露斯永年無病而肝為腎子母氣既衰水不生木肝屬風藏內風乘龍雷相火迅速飛騰陡升莫制每慮僕中之纍是皆內因之症自述熱起脊背直至巔頂清之補之無效未免藏陰內乏陽氣獨升之旨古人以腎藏內寓真陽非溫不納肝藏內寄相火非清不寧用藥之法填實精氣以固其下佐鹹味以達之兼氣重以鎮之介類以潛之酸味以收之復入滋清以涼肝引之導之浮陽內風勿令鼓動熟地北五味子萸肉磁石青鹽瑣陽龜板茯神湘蓮天門冬豬脊筋張石頑治春榜趙明遠平時六脈微弱己酉九月患類中風經歲不痊邀石頑診之其左手三部弦大而堅知為腎藏陰傷壯火食氣之候且人迎斜內向寸又謂三陽經滿溢入陽維之脈是不能無顛仆不仁之慮右手三部浮緩而氣口以上微滑乃痰沫壅塞於鬲之象以清陽之位而為痰氣占據未免侵及心主是以神識不清語言錯誤也或者以其神識不清言語錯誤口角常有微涎目晴恆不易轉以為邪滯經絡而用祛風導痰之藥殊不知此本腎氣不能上通於心心藏虛熱生風之症良非燥藥所宜或者以其小便清利倍常以為腎虛而用八味壯火之劑殊不知此症雖虛而虛陽伏於肝藏所以陽事易舉飲食易飢又非益火補陰藥所宜或者以其向患休息久痢大便後常有痰紅漬沫而用補中益氣殊不知脾氣陷於下焦者可用升舉之法此陰血久利之餘疾有何清氣在可升發乎若用升柴升動肝腎虛陽鼓激鬲上痰飲能保其不為喘脹逆滿之患乎是升舉藥不宜輕服也今舉河間地黃飲子助其腎通其心一舉而兩得之但不能薄滋味遠房室則藥雖應病終無益於治療也惟智者善為調攝為第一義熟地巴戟天蓯蓉山萸肉茯苓薄荷淡熟川附肉桂五味子麥冬川石斛遠志鮮石菖蒲虛勞陽外泄為汗陰下注則遺二氣造偏陰虛熱勝腦為髓海腹是至陰皆陽乘於陰然陽氣有餘益見陰弱無以交戀其陽因病致偏偏久致損坐功運氣陰陽未協損不肯復頗為可慮今深秋入冬天氣收肅陽氣泄越入暮灼熱總是陰精損傷而為消爍耳川石斛炒知母女貞子茯神糯稻根小黑穭豆皮又暮夜熱熾陰虛何疑但從前表散致衛陽疏泄穿山甲鑽筋流利後至經絡氣血劫撤內損不復衛陽藩籬交空斯時亦可撐半壁矣失此機宜秋收冬藏主令其在封固蟄藏耳張季明謂元無所歸則熱灼亦是人參河車熟地五味蓮肉山藥茯苓今年長夏久熱傷損真陰深秋天氣收肅奈身中泄越已甚吸短精濁消渴眩暈見症都是肝腎脈由陰漸損及陽明胃絡納穀減肢無力越人所云陰傷及陽最難充復誠治病易治損難耳人參天冬生地茯神女貞遠志脈數垂入尺澤穴中此陰精未充早泄陽失潛藏汗出吸短龍相內灼升騰面目肺受熏蒸嚏涕交作兼之胃弱少谷精濁下注溺管疼痛肝陽吸其腎陰善怒多郁顯然腎虛如繪議有情之屬以填精仿古滑澀互施法牛骨髓豬脊髓羊脊髓麋角膠熟地人參萸肉五味芡實湖蓮山藥茯神金櫻膏膠髓丸此少壯精氣未旺致奇脈網維失護經云形不足者溫之以氣精不足者補之以味今納穀如昔血肉充養補之以味莫若以飲食補之牛骨髓羊骨髓豬骨髓茯神枸杞當歸湖蓮芡實據說熱自左升直至耳前後脹視面色油亮足心灼熱每午後入暮皆然上午用茶調散宣通上焦鬱熱不應此肝腎陰火乘竅即因男子精虧陽不下交經言以滋填陰藥必佐介屬重鎮試以安寢竟夜乃安參陽動陰靜至理熟地龜板萸肉五味茯苓磁石黃柏知母豬脊髓丸有形血液從破傷而損神氣無以擁護當此冬令藏陽陽微畏寒奇脈少津乏氣貫布行步欹斜健忘若憒何一非精氣內奪之徵將交大雪純陰無陽冬至一陽來復也見此離散之態平素不受暖補是氣元長旺今乃精衰氣竭之象又不拘乎此例也人參鹿茸歸身炒杞子茯苓沙苑陰精走泄於下陽氣鬱冒於上太衝脈衰厥氣上衝陡然癇厥陰陽既失交偶因隨陽掀旋陽從汗泄矣宜遠房帷獨居靜室醫治之法從陰引陽大封大固以蟄藏為要百日可效經年可以復元淡蓯蓉五味遠志茯神芡實建蓮生羊腰子勞怯形色奪肌肉消食減便滑兼嗆痰喉痛知醫理者再無清喉涼肺滋陰矣病人述心事操持病加顯然內損關係臟真冬寒藏陽人身之陽升騰失交收藏失司豈見病治病膚淺之見識據說食進逾時必有痛泄經言食至小腸變化屈曲腸間有阻常有諸矣凡湯藥氣升宜丸劑疏補資生丸食後服人參坎氣茯苓黑殼建蓮五味芡實山藥漿丸虛勞三年形神大衰食減無味大便溏瀉寒起背肢熱從心熾每咳必百脈動掣間或脅肋攻觸種種見症都是病深傳遍前議四君子湯以養脾胃沖和加入桑葉丹皮利少陽木火使土少侵服已不應想人身中二氣致偏則病今脈症乃損傷已極草木焉得振頓見病治病諒元裨益益氣少靈理從營議食少滑泄非滋膩所宜暫用景嶽理陰煎法參入鎮逆固攝若不胃蘇知味實難擬法人參秋石山藥茯苓河車膠丸春深地氣升陽氣動有奔馳飢飽即是勞傷內經勞者溫之夫勞則形體震動陽氣先傷此溫字乃溫養之義非溫熱競進之謂勞傷久不復原為損內經有損者益之文益者補益也凡補藥氣皆溫味皆甘培生其初陽是勞損主治法則春病入秋不愈議從中治據述晨起未納水穀其咳必甚胃藥坐鎮中宮為宜麥冬人參甘草粳米大棗脈左小右虛背微寒肌微冷痰多微嘔食減不甘此胃陽已弱衛氣不得擁護時作微寒微熱之狀小便短赤大便微溏非實邪矣當建立中氣以維營衛東垣云骨為衛之本營乃脾之源偏熱偏寒猶非正治人參歸身米拌炒桂枝木白芍炒焦南棗勞傷陽氣不肯復元秋冬之交余宗東垣甘溫為法原得小效衆楚交咻柴葛枳朴是餌二氣散越交紐失固閃氣疼痛脘中痞結皆清陽凋喪無攻痛成法唯以和補使營衛之行冀其少緩神蘇而已人參當歸炒白芍桂心炙草茯神久客勞傷氣分痹阻則上焦清空諸竅不利初病在氣久則入血身痛目黃食減形瘦由病患及乎元虛攻補未能除病思人身左升屬肝右降屬肺當兩和氣血使升降得宜若再延挨必瘀滯日甚結為腑聚矣旋覆花湯加桃仁歸鬚蔞皮症見失血咳嗽繼而暮熱不止經水仍來六七年已不孕育乃肝腎衝任皆損二氣不交延為勞怯治以攝固包舉其泄越鮮河車膠黃柏熟地淡蓯蓉五味茯神蜜丸診脈數左略大右腰牽絆足痿五更盜汗即醒有夢情欲則遺自病半年脊椎六七節骨形凸出自述書齊坐臥受濕若六淫致病新邪自解驗色脈推病是先天稟賦原怯未經充旺肝血腎精受戕致奇經八脈中乏運用之力乃筋骨間病內應精血之損傷也人參鹿茸杞子當歸舶茴香紫衣胡桃肉生雄羊內腎幼年成婚太早精氣未充先泄上年泄瀉繼加痰嗽納食較少形肌日瘦今秋深喉痛是腎精內乏陰中龍雷閃爍無制當此秋令肅降藏職失司明歲穀雨萬花開遍此病危矣秋石拌人參生紫石英紫衣胡桃肉茯神女貞實五味子男子思念未遂陰火內燔五液日奪但孤陽升騰熏蒸上竅已失交泰之義此非外來之症凡陰精殘憊務在胃旺納穀生陰今咽喉耳鼻諸竅久遭陰火之逼寒涼清解僅調六氣中之火而臟真陰火乃閃電迅速莫遏清涼必不卻病良由精血內空草木藥餌不能生精充液耳豬脊髓阿膠川斛天冬生地咳嗽秋令天氣下降上焦先受燥化其咳症最多屢進肺藥無功按經云久咳不已則三焦受之是不專於理肺可知矣六旬又三形體雖充而真氣漸衰古人於有年久嗽都從脾腎子母相生主治更有咳久氣多發泄亦必益氣甘補斂攝實至理也茲議攝納下焦於早服而純甘清燥暮進填實在下清肅在上凡藥味苦辛宜忌為傷胃泄氣預防也早服水制熟地白雲苓乳蒸五味子建蓮淮山藥車前子淮牛膝紫衣胡桃肉霜上為末用蒸熟豬脊髓去膜搗丸開水送下晚服真北沙參生黃耆薄皮麥冬生白扁豆生甘草南棗肉上淡水煎汁濾清收膏臨成加真柿霜收開水化服昨議上焦肺病百日未痊形肌消爍悉由熱化久熱無有不傷陰液擬咸補如阿膠雞子黃復入芩連苦寒自上清氣熱以補下雖為暫服之方原非峻克之劑細思手經之病原無劇入足經之理但人身氣機合乎天地自然肺氣從右而降肝氣從左而升肺病主降日遲肝橫司升日速咳嗆未已乃肝膽木反刑金之兆試言及久寐寤醒左常似閃爍嘈雜如飢及至進食未覺胃中安適此肝陽化風旋擾不息致嗆無卒期即倏熱之來升至左頰其左升太過足為明驗倘升之不已入春肝木司權防有失血之纍故左右為陰陽之道路陰陽既造其偏以致病所以清寒滋陰不能奏其速功阿膠雞子黃生地天冬女貞實糯稻根鬚向來陽氣不充得溫補每每奏效近因勞煩令陽氣弛張致風溫過肺衛以擾心營欲咳心中先癢痰中偶帶血點不必過投沉降清散以辛甘涼理上燥清絡熱疏食安閒旬日可安冬桑葉玉竹大沙參甜杏仁生甘草苡仁糯米湯煎外受風溫郁遏內因肝膽陽升莫制斯皆肺失清肅咳痰不解經月來猶覺氣壅不降進食頗少大便不爽津液已久乏上供腑中之氣亦不宣暢議養胃陰以和陽不得泛泛治咳麥冬沙參玉竹生白芍扁豆茯苓冬季溫邪咳嗽是水虧熱氣內侵交驚蟄節嗽減用六味加阿膠麥冬秋石金水同治是瀉陽益陰方法為調體治病兼方近旬日前咳嗽復作納食不甘詢知夜坐勞形當暮春地氣主升夜坐達旦身中陽氣亦有升無降最有失血之慮況體豐肌柔氣易泄越當暫停誦讀數日可愈桑葉甜杏仁大沙參生甘草玉竹青蔗漿脈右徑因疥瘡頻以熱湯沐浴衛疏易傷冷熱皮毛內應乎肺咳嗽氣塞痰多久則食不甘便燥結胃津日耗不司供肺況秋冬天降燥氣上加漸至老年痰火之象此清氣熱以潤燥理勢宜然倘畏虛日投滯補益就枯燥矣霜桑葉甜杏仁麥冬玉竹白沙參天花粉甘蔗漿甜梨汁形瘦色蒼體質偏熱而五液不充冬月溫暖真氣少藏其少陰腎臟先已習習風生乃陽動之化不以育陰驅熱以卻溫氣泛泛乎辛散為暴感風寒之治過辛泄肺肺氣散斯咳不已苦味沉降胃口戕而腎關傷致食減氣怯行動數武氣欲喘急封藏納固之司漸失內損顯然非見病攻病矣靜養百日猶冀其安麥冬甜沙參生甘草南棗肉青蔗漿久咳三年痰多食少身動必息鳴如喘診脈左搏數右小數自覺內火燔燎乃五液內耗陽少制伏非實火也常以瓊玉膏滋水益氣暫用湯藥總以勿損胃為上治嗽之藥諒無益於體病北沙參白扁豆炒麥冬茯神川石斛花粉寡居煩勞脈右搏左澀氣燥在上血液暗虧由思郁致五志煩煎固非溫熱補澀之症晨咳吐涎姑從胃治以血海亦隸陽明耳生白扁豆玉竹大沙參茯神經霜柔葉苡仁用白糯米淘濾清入滾水泡一沸取清湯煎藥又本虛在下情懷悒鬱則五志之陽上熏為咳固非實火但久郁必氣結血涸延成乾血勞病經候澀少愆期已屬明徵當培肝腎之陰以治本清養肺胃氣熱以理標剛熱之補畏其劫陰非法也生扁豆北沙參茯神炙草南棗肉丸方熟地黃砂仁末拌炒鹿角霜當歸小茴香拌炒淮牛膝鹽水炒炭雲茯苓紫石英醋煅水飛青鹽另熬生羊肉膠和丸今年春季時疫大半皆有咳嗽咽喉之患乃邪自上干肺氣先傷耳近日身動氣喘聲音漸不揚著左眠臥左脅上有牽掣之狀此肝腎陰虧沖氣上觸冬藏失司漸有側眠音啞至矣勞傷致損非清邪治咳之病六味丸加淡秋石阿膠麥冬蜜丸脈左弱右搏久有虛損交春不復夜臥著枕氣衝咳甚即行走亦氣短喘促此乃下元根蒂已薄冬藏不固春升生氣淺少急當固納攝下世俗每以辛涼理嗽每致不救矣水制熟地五味湖蓮芡實茯神青鹽羊肉腎久有痛經氣血不甚流暢驟加暴怒肝陽逆行乘肺則咳病家云少腹沖氣上干其咳乃作則知清潤肺藥非中竅之法今寒熱之餘咳不聲揚但脅中拘急不飢不納乃左升右降不司旋轉而胃中遂失下行為順之旨古人以肝病易於犯胃然則肝用宜泄胃腑宜通為定例矣桑葉丹皮鉤藤茯苓半夏廣皮威喜丸氣鬱單脹中空無物臥則氣塞濁飲上衝漸有不得安臥之象問其起病之由多是惱怒動肝為肝木鬱傷脾土脾失健運氣阻成脹延及百日正氣愈虛濁更堅凝逆走攻肺上咳氣逆欲喘脘中蘊熱咳出膿血病根固在肝脾今已傳及肺部丹溪曰養金制木脾無賊邪之害滋水制火肺得清化之權目下至要務在順氣胸中開爽寢食不廢便可從容論治不然春分節近更屬難調矣先用宣通上焦法紫菀杏仁蔞皮鬱金厚朴大腹皮桑皮茯苓皮黑山梔腎精下損致陰氣上乘浮陽上灼咽喉痛痹有喉宣發現咳嗽喘促是下焦元海不司收納衝脈之氣上衝所致故日進潤劑望其咳減為庸醫之良法實釀病之禍階現在胃弱便溏則非治嗽可療矣勞怯不復當以固真納氣培扶胃口希冀加谷則吉人參茯苓芡實坎氣湘蓮子秋石五味子胡桃凡憂愁思慮之內傷不足必先上損心肺心主營肺主衛二氣既虧不耐煩勞易於受邪惟養正則邪自除無麻桂大劫散之理故內傷必取法乎東垣今血止脈耎形倦不食嗆咳不已吐痰若黏涎皆土敗金枯之象急與甘緩補法生黃耆炒白芍炙草飴糖南棗失音秋涼燥氣咳嗽初病皮毛凜凜冬月失音至夏未愈而納食頗安想屢經暴冷暴暖之傷未必是二氣之餒仿金實無聲議治麻黃杏仁石膏生甘草射干苡仁勞損氣喘失音全屬下元無力真氣不得上注紛紛清熱治肺致食減便溏改投熱藥又是劫液宜乎喉痛神疲矣用補足三陰方法熟地五味炒山藥芡實茯苓建蓮肉肺象空懸氣窒聲音不出舌乃心苗熱灼則舌本不展以唇口肺家之病乃辛熱酒毒之痹主以輕揚為治乃無質之病羚羊角連翹心竹葉心野赤豆皮川貝母金銀花威喜丸肺痿潰瘍流膿經年脈細色奪聲嘶食減咳嗽喉中梗痛皆漏損脂液陰失內守陽失外衛肺痿之疴諒難全好人參黃耆苡仁炙草歸身白芨肺痿頓吐涎沫食物不下並不渴飲豈是實火津液蕩盡二便日少宗仲景甘藥理胃乃虛則補母仍佐宣通脘間之捍格人參麥冬熟半夏生甘草白粳米南棗肉勞煩經營陽氣弛張即冬溫外因咳嗽亦是氣泄邪侵辛以散邪苦以降逆希冀嗽止而肺欲辛過辛則正氣散失音不能揚色消吐涎喉痹是肺痿難治矣仿內經氣味過辛主以甘緩北沙參炒麥冬飴糖南棗凡外熱入肺而咳嗽者可用表散藥若內傷纍及於肺而致咳者必從內傷治汗之則泄陽氣肺痿音低顯然藥誤黃耆黃精棗仁白芨病人述上年五月住直隸白溝河北方不比南地濕蒸則熱夜坐仍涼想是時寒熱亦是輕邪醫用滾痰丸下奪表邪閉結不出肺痿音啞喉癟咽物艱難仿徐之才輕可去實用有氣無味之藥射干生甘草大力子麻黃炙蟬衣囫圇滑石連皮杏仁厄逆脈微弱面亮載陽厄逆脅痛自利先曾寒熱下利加以勞煩傷陽高年豈宜反復乃欲脫之象三焦俱有見症議從中治人參附子丁香皮柿蒂茯苓生乾薑食傷腸胃復病嘔吐發厄下利診兩脈微澀是陽氣欲盡濁陰沖逆閲方雖有姜附之理陽反雜入耆歸呆鈍牽制後方代赭重墜又混表藥總屬不解今事危至急舍理陽驅陰無別法人參茯苓丁香柿蒂炮附子乾薑吳萸脈搏徑舌乾赤噯氣不展狀如厄忒緣頻吐胃傷諸經之氣上逆填胸聚脘出入機逆周行脈痹肌肉著席而痛轉加平昔辛香燥藥不受先議治肺經以肺主一身之氣化耳枇杷葉汁杏仁桔梗枳實吐血積瘀在絡動絡血逆今年六月初時令暴熱熱氣吸入首先犯肺氣熱血湧強降其血血藥皆屬呆滯而清空熱氣仍蒙閉於頭髓空靈之所諸竅閉塞鼻窒瘜肉出納之氣都從口出顯然肺氣鬱蒸致腦髓熱蒸脂液自下古稱爍物消物莫如火但清寒直泄中下清空之病仍然議以氣分輕揚無取外散專事內通醫工遇此法則每每忽而失察連翹牛蒡子通草桑葉鮮荷葉汁青菊花葉生石膏以毒藥熏瘡火氣逼射肺金遂令咳嗆痰血咽乾胸悶診脈尺浮下焦陰氣不藏最慮病延及下即有虛損之患姑以輕藥暫漸清上焦以解火氣杏仁緑豆皮冬瓜子苡仁川貝兜鈴脈數澀小結痰血經年屢發仍能納食應酬此非精血損怯由乎五志過動相火內起肝膽操持鬱勃皆令動灼致絡血上滲混痰火必靜養數月方安否則木火劫爍胃傷減食病由是日加矣丹皮薄荷梗菊花葉黑梔淡黃芩生白芍鬱金川貝虛不肯復謂之損納食不充肌膚臥眠不能著左遇節令痰必帶血脈左細右徑數是從肝腎陰血之傷延及氣分倘能節勞安逸僅能帶病永年損症五六年無攻病之理臟屬陰議平補足三陰法人參山藥熟地天冬五味女貞內經分上下失血為陰絡陽絡是腑絡取胃臟絡論脾今飲食甚少柔膩姑緩上下交病治在中焦其午火升煩嗽亦因血去陽傷以胃藥從中鎮補使生氣自充也人參茯苓白朮炙草扁豆白芍山藥向有失血是真陰不旺夏至陰生伏天陽越於表陰伏於裡理宜然矣無如心神易動暗吸腎陰絡脈聚血陽觸乃溢陰伏不固隨陽奔騰自述下有衝突逆氣血湧如泉蓋任脈為擔任之職失其擔任衝陽上衝莫制皆腎精肝血不主內守陽翔為血溢陽墜為陰遺腰痛足脛畏冷何一非精奪下損現症經言精不足者補之以味藥味宜取質靜填補重著歸下莫見血以投涼勿因嗽以理肺若此治法元海得以立基衝陽不來犯上然損非旬日可復須寒暑更遷凝然不動自日遂安適調攝未暇縷悉也人參炒熟地鮮河車膠茯苓炒黑枸杞子北五味沙苑紫石英早晨未進飲食咳逆自中焦上衝有欲嘔之象虛里左脅呼吸牽引震動背部四肢寒冷入暮心腹熱灼而舌上干辣夫陽虛外生寒陰虛生內熱陽屬腑氣主乎外衛陰屬臟真主乎內營由絡血大去新血未充穀味精華不得四布知味容納而健運未能自然脅右少舒全系胃絡下焦陰精損傷中焦胃陽不振夏至初陰不主來復交節絡血再動總是既損難以驟復之徵大意下焦陰陽宜潛宜固中焦營衛宜守宜行用藥大旨如此至於潛心滌慮勿擾情志再於子午參以靜功俾水火交陰陽偶是藥餌以外工夫皆培植生氣之助幸留意焉養營湯去黃耆遠志操持怫鬱五志中陽動極失血咳嗆有年皆由性情內起之病草木難以奏安今形色與脈日現衰憊系乎生氣克削慮春半以後地氣升陽氣泄久病傷損里真少聚冬春天冷主藏總以攝補足三陰臟扶持帶病延年就是人工克盡矣人參炒白芍熟地炭五味建蓮炙草脈堅形瘦久咳失血有年食物厭惡夜寢不適固以培本為要所服七味八味湯丸乃肝腎從陰引陽法服之不效此液虧不受桂附之剛當溫養攝納其下兼與益胃津以供肺早服熟地柏子仁杞子五味胡桃肉牛膝蓯蓉茯苓蜜丸晚服人參麥冬五味炙草茯苓山藥鮮蓮子半月前恰春分陽氣正升因情志之動厥陽上燔致咳震動絡中遂令失血雖得血止診右脈長大透寸部食物不欲納寐中呻吟囈語由至陰損及陽明精氣神不相交合矣議斂攝神氣法人參茯神五味炙草棗仁龍骨金箔血大去則絡脈皆空其傷損已非一腑一臟之間矣秋分寒露天氣令降身中氣反升越明明裡不肯收攝虛象何疑今診脈弱濡澀肢節微冷氣傷上逆若煙霧迷離熏灼喉底故作嗆逆大旨以上焦宜降宜通下焦宜封宜固得安穀崇土再商後法人參炒黑杞子炒黑牛漆茯神炒山藥生苡仁憂思怫鬱五志氣火內燔加以煙辛泄肺酒熱戕胃精華營液為熱蒸化敗濁經云陽絡傷則血外溢蓋胃絡受傷陽明氣血頗富猶勉強延磨歲月至於陽明脈絡日衰斯背先發冷右脅痠痛而咳吐不已胃土愈憊肝木益橫厥陽愈逆穢濁氣味無有非自下泛上大凡左升屬肝右降屬肺由中焦胃土既困致有升無降壅阻交迫所以著左臥眠遏其升逆之威且煩蒸熱灼並無口渴飲水之狀病情全在血絡清熱滋陰之治力量不能入絡茲定清養胃陰為主另進通絡之方肝膽厥陽少和冀其涎少脅通積久沉疴調之非易桑葉丹皮苡仁蘇子鉤藤鬱金降香桃仁有年冬藏失司似乎外感熱熾辛散苦寒是有餘實症治法自春入夏大氣開泄日見懨懨衰倦呼吸喉息有聲脅肋窒板欲痛咯嗆紫血絡脈不和議以辛補通調不致寒凝燥結冀免關格上下交阻之纍柏子仁細生地當歸鬚桃仁降香茯神先有骨痛鼓栗每至旬日必吐血碗許自冬入夏皆然近僅可仰臥著右則咳逆不已據說因怒勞致病都是陽氣過動而消渴舌翳仍納穀如昔姑以兩和厥陰陽明之陽非徒泛泛見血見嗽為治石膏熟地麥冬知母牛膝脈數左堅當夏四月陽氣方張陡然嗔怒肝陽勃升絡血上湧雖得血止而咳逆欲嘔眠臥不得欹左此肝陽左升太過木失水涵陰虧則生熱是皆本體陰陽迭偏非客邪實火可清可降之比最宜恬淡無為安靜幽閒經年不反可望轉偏就和但圖藥治難減損怯矣經云胃咳之狀咳逆而嘔木犯胃土貫膈即至沖咽入肺肺衰木反刑金從內經甘緩以制其急米炒麥冬糯稻根鬚女貞子茯神生甘草南棗肉血去胃傷當從中治況五年前勞怒而得病肝木無不剋土醫者溫補競進氣壅為脹至夜咽乾無寐食物不思杳不知味為嘔為咳全是胃陽升逆經云胃不利則臥不安而陽不潛降似屬濁氣膠痰有形之物阻撓升降而然古人有二虛一實當先治實以開一面之文余從胃病為主制肝救中理氣清膈乃不足中有餘圓通之治此機勿得亂治人參枳實半夏杏仁甘草竹茹生薑大棗脈左弦右小濡據病源起於憂鬱鬱勃久而化熱蒸迫脈絡血為上溢凝結成塊者離絡留而為瘀也血後納食如昔是腑絡所貯頗富況腑以通為用血逆氣亦上並漉漉有聲皆火氣旋動非有形質之物凡血病五臟六腑皆有是症當清陽之絡為要致於病發當治其因又不必拘執其常也枇杷葉苡仁茯苓蘇子桑葉丹皮炒桃仁降香末診脈左手平和尺中微動右手三部關前動數尺脈帶數夜臥不寐咳嗆有血晝日咳嗆無血但行走微微喘促夫陰陽互為樞紐隆冬天氣藏納緣心煩勞神五志皆動陽不潛伏當欲寐之時氣機下潛觸其陽氣之升衝脈升動絡中之血未得寧靜隨咳嗆溢於上竅至於步趨言談亦助其動搏氣火此咳嗆喘息失血同是一原之恙當靜以制動投藥益水生金以制君相之火然食味宜遠辛辣熱燥凡上實者必下虛薄味清肅上焦正謂安下令其藏納也愚見約方參末俟裁生扁豆麥冬川斛上阿膠小根生地真北沙參脈細小如無素多鬱怒經來即病冬患胃痛隨有咯血不止寒戰面赤驚惕頭搖顯是肝陽變風絡血沸起四肢逆冷真氣衰微內經有肝病暴變之文勢豈輕渺議用景嶽鎮陰煎法制其陽逆仍是就下之義熟地灰牛膝炭肉桂茯神生白芍童便水寒外加驚氣內迫陰瘧三年繼患嗽血迄今七年未有愈期詢及血來紫塊仍能知味安穀參其瘧傷驚傷必是肝絡凝瘀得怒勞必發勿與酒色傷損亂投滋陰膩濁之藥恐胃氣日減致病漸劇桃仁鱉甲川桂枝歸鬚大黃茺蔚子色蒼肉瘦形象尖長木火之質陰液最難充旺春間咳嗽雖系風溫外邪但既屬陰虧冬藏先已不固因咳逆震動浮陽上胃清空自阻用藥宜取沉靜質重填陰鎮陽方是閲方辛氣居半與磁石相阻蓯蓉陰中之陽亦非收攝不效宜矣大熟地靈磁石萸肉五味子牡丹皮雲茯苓阿膠懷山藥澤瀉龜板脅膈左右懊憹不舒嘔逆帶血凡人臟腑之外必有脈絡拘絆絡中乃聚血之地中年操持皆令耗血血不和氣氣攻入絡病狀難以自明宣通血分以和絡俾不致瘀著可免噎膈反胃新絳青蔥管橘葉桃仁栝蔞仁鉤藤頻年發失血症嗽甚痰出繼以嘔噯日晡寒熱夜深汗泄據述醫見血投以鬱金薑黃韭汁製大黃逐瘀下走希圖血止此是有餘治法夫人稟陰陽偏則致病自內損傷即是不足脈左動數尺不附骨明明腎精肝血內奪弱陰無能交戀其陽衝陽上逆吸氣不入是以咳嗽氣升旋必嘔噯濁涎黏沫內經謂五臟六腑皆令人咳奈何今人以咳治肺見痰降濁清熱損者更損殆不復藏陰府陽消長之機雜藥徒伐胃氣經年纍月已非暴病填實下隙須藉有情之屬人參紫衣胡桃紫石英茯神五味子山萸肉河車膠秋石診脈左數微弦寸尺關虛數閲五年前病原左脅映背脹痛不能臥席曾吐瘀血凝塊紫色顯然肝鬱成熱熱迫氣逆血瘀雖經調理全愈而體質中肝陰不充肝陽已動凡人身之氣左升主肝右降主肺今升多降少陰不和陽胃中津液乏上供涵肺之用此燥癢咳嗆吐出水沫合乎經旨肝病吐涎沫矣肝木必犯胃土納穀最少而肢軟少力非嗽藥可以愈病此皆肝陽逆乘實系肝陰不足仲聖云見肝之病先理脾胃俾土厚不為木克原有生金功能據述凡食雞子病必加劇則知呆滯凝澀之藥皆與病體未合北沙參生扁豆麥冬玉竹桑葉生甘草蔗漿脈右弦左濡秋涼宿飲上泛咳嗆入夜著枕欲寐氣衝胃脘心悸震動必欲起坐仲景論脈篇弦為飲背寒為飲當治飲不當治咳飲屬陰邪乘暮夜竊發金匱法中每以通陽滌飲與世俗僅以肺藥疏降迥異用小青龍減麻辛法桂枝五味子乾薑茯苓白芍炙草半夏衄血從前衄血都以養陰益氣而愈知非實熱皆勞役傷胃以致陰血之動也今壯年肌肉不充身動氣促如喘口中膩涎濁沫竟是腎精損傷收納失職之象急急保養遠戒酒色猶可向安熟地人參萸肉湖蓮芡實補骨脂山藥粉丸行走多動陽酒濕多變熱熱氣上升犯冒清竅頭蒙聤脹衄血成流上齶腐瘍久必漏卮世俗通套每用犀角地黃然酒性先入膽次及胃酒客性惡甜膩從苦降定議以苦能卻濕也桑葉苦丁茶連翹荷葉邊丹皮射干病人述遇春季失血煩勞必有衄血凡冬天大氣藏伏壯年自能聚精匯神不加保養春半陽生升發反為發病根機是皆身中精氣之薄胃旺安納能自接飲靜養則神乃藏熟地萸肉山藥芡實湘蓮茯苓金櫻子五味子青龍骨便血脈左虛澀右緩大尾閭痛連脊骨便後有血自覺惶惶欲暈兼之納穀最少明是中下交損八脈全虧早進青囊斑龍丸峻補玉堂關元暮服歸脾膏涵養營陰守之經年形體自固鹿茸鹿角霜鹿角膠柏子仁熟地韭子菟絲子赤白茯苓補骨脂脈小瀉血有二十年經云陰絡傷血內溢自病起十六載不得孕育述心中痛墜血下不論糞前糞後且脊椎腰尻酸楚而經水仍至跗膝常冷而骨髓熱灼由陰液損傷傷及陽不固密閲頻年服藥歸耆雜入涼肝焉是遵古治病議從奇經升固一法鹿茸鹿角霜枸杞子歸身紫石英沙苑生杜仲炒大茴補骨脂禹餘糧石蒸餅漿丸入暮腹痛鳴響睪丸久已偏墜春正下血經月顏色鮮明此痛決非傷於積聚乃營損寒乘木來侮土致十四載之纏綿調養培土以甘泄木散郁宜辛節口戒欲百天可效人參炒當歸炒白芍肉桂炮姜茯苓炙草南棗脈小左數便實下血乃肝絡熱騰血不自寧醫投參耆歸桂甘辛溫暖昧於相火寄藏肝膽火焰風翔上蒙清空鼻塞頭暈嗆咳不已一誤再誤遺患中厥夫下虛則上實陰傷陽浮此乃一定至理連翹心竹葉心鮮生地元參丹皮川斛又下血陰傷走泄虛陽上升頭為清竅參耆朮桂辛甘助上致鼻塞耳聾用清上五六日右脈已小左仍細數乃陰虧本象下愈虛則上愈實議以滋水制火之方生地元參天冬川斛茯神炒牛膝年前痰飲哮喘不得安臥以辛溫通陽劫飲而愈知脾陽內弱運氣失職水穀氣蒸飲邪由濕而成濕屬陰久郁化熱熱入絡血必自下但體質仍屬陽虛凡腸紅成方每多苦寒若臟連之類於體未合毋欲速也生於術茯苓澤瀉地榆炭桑葉丹皮脈緩濡弱陽氣不足過飲濕勝大便溏滑似乎不禁便後血色紅紫兼有成塊而下論理是少陰腎臟失司固攝而陽明胃脈但開無合矣從來治腑以通為補與治臟補法迥異先擬暖胃通陽一法生茅朮人參茯苓新會皮厚朴炮附子炮薑炭地榆炭嗔怒動肝絡血乃下按之痛減為虛夫肝木上升必犯胃口遂脹欲嘔清陽下陷門戶失藏致裡急便血參朮炮姜辛甘溫暖乃太陰脾藥焉能和及肝胃丹溪云上升之氣自肝而出自覺冷者非真冷也駐車丸寒熱如瘧便血不已左脅有塊攻逆不已而作痛脈弦數兼澀弦則為風數則為熱澀則氣結此肝脾之氣悒鬱不宣胸中陽和抑而成火故神明不清肝之應為風肝氣動則風從之故表見寒熱也人身左半肝腎主之肝風自逆故左脅攻楚有塊也肝為藏血之地肝傷則血不守且以風淫熱勝蓋為亡血之由也生首烏黃連柴胡黃芩知母枳實厚朴患溺血症已三月矣前用升補法不應右脈澀無神左關獨弦莖中作痛下多血塊形色憔悴又多噯氣據脈論症乃肝脾積熱也肝熱則陰火不寧而陰血自動以血為肝臟所藏而三焦之火又寄養於肝也故溺血莖中作痛脾熱則濕氣內壅而生氣不伸以脾為濕土之化而三焦之氣又運行於脾也故時時噯氣形色憔悴法當益肝之陰則火自平利脾之濕則氣自和生地白芍萆薢丹皮甘草車前稚年瀉血是飲食不調熱蒸於絡為腸胃之病肛痔亦由濕熱內蒸而致熱甚則陰液不充風熱上升故干嗆法當與甘寒之劑俾金水同出一源況肺熱必移大腸腎開竅於二陰也鮮生地地骨皮麥門冬金銀花穭豆皮肥知母傷寒蓄血都是邪入於裡內經謂陰絡傷血乃下溢陰為臟病陰氣從下走泄陽氣失戀上冒遂令神識昏狂乃脫症也況在立冬大節之交關閲醫藥今朝所服猶是羌防菖根前此柴防服之屢屢身中陰陽遭此魔障劫盡焉有安逸之理雖急急收拾散越恐未穩追返耳人參茯神禹餘糧木瓜五味小麥哮喘先寒後熱不飢不食繼浮腫喘嗆俯不能仰仰臥不安古人以先喘後脹治肺先脹後喘治脾今由氣分膹郁以致水道阻塞大便溏瀉仍不爽利其肺氣不降二腸交阻水穀蒸腐之濕橫趨脈絡腫由漸加豈亂醫可效粗述大略與高明論證至肺位最高主氣為手太陰臟其臟體惡寒喜熱宣辛則通微苦則降若藥氣味重濁直入中下非宣肺方法矣故手經與足經大異當世不分手足經混治者特表及之麻黃苡仁茯苓杏仁甘草色痿腠疏陽虛體質平昔喜進膏粱上焦易壅中宮少運厚味凝聚蒸痰頻年咳嗽但內傷失和薄味自可清肅醫用皂莢搜攢肺傷氣泄噴嚏不已而沉錮膠濁仍處胸背募俞之間玉屏風散之固衛六君子湯之健脾理痰多是守劑不令宣通獨小青龍湯徹飲以就太陽初服喘緩得宣通之意夫太陽但開所缺通補陽明一段工夫不得其闔暫開復痹矣且喘病之因在肺為實在腎為虛此病細診色脈是上實下虛以致耳聾鳴響治下之法壯水源以熄內風為主而胸次清陽少旋濁痰阻氣妨食於臥時繼以清肅上中二焦小劑守常調理百日圖功至於接應世務自宜節省勿在藥理中也熟地萸肉龜甲心阿膠牛膝茯苓遠志五味磁石秋石脈細尺垂形瘦食少身動即氣促喘急大凡氣出不爽而喘為肺病客感居多今動則陽化由乎陰弱失納乃吸氣入而為喘腎病何辭治法惟以收攝固真上病當實下焦宗腎氣方法意熟地萸肉五味補骨脂胡桃肉牛膝茯苓山藥車前子蜜丸望八大年因冬溫內侵遂至痰嗽暮甚診脈大而動搏察色形枯汗泄吸音頗促似屬痰阻此乃元海根微不司藏納神衰囈語陽從汗出最有昏脫之變古人老年痰嗽喘症都從脾腎主治今溫邪擾攘上中二焦留熱雖無溫之理然攝固下真以治根本所謂陽根於陰豈可不為講究熟地炭胡桃肉牛膝炭車前子雲茯苓青鉛瘡毒內攻所進水穀不化蒸變濕邪漬於經隧之間不能由腸而下膀胱不利濁上壅遏肺氣不降喘滿不堪著枕三焦閉塞漸不可治議用中滿分消之法必得小便通利可以援救葶藶苦杏仁桑皮厚朴豬苓通草大腹皮茯苓皮澤瀉老年冬季喘嗽是元海不主收攝衛陽升舉飲邪上泛阻遏流行喘嗽愈甚閲古都主八味腎氣溫養坎中之陽收納散失之真不主消痰清肺意謂非因六氣所致奈體質不受桂附年前議進柔陽通攝若以建立上中之陽乃心脾甘溫之劑與下焦不納無關紫衣胡桃肉茯苓補骨脂鹿茸肉蓯蓉五味子遠志肉青鹽柏子霜蜜丸痰飲昔肥今瘦為飲仲景云脈沉而弦是為飲家男子向老下元先虧氣不收攝則痰飲上泛飲與氣湧斯為咳矣今醫見嗽輒以清肺降氣消痰久而不效更與滋陰不明痰飲皆屬濁陰之化滋則堆砌助濁滯氣試述著枕咳嗆一端知身體臥著上氣不平必下衝上逆其痰飲伏於至陰之界腎臟絡病無疑形寒畏風陽氣微弱而藩籬疏撤仲景有要言不煩曰飲邪必用溫藥和之更分外飲治脾內飲治腎不讀聖經焉知此理桂苓甘術湯脈弦右濡陽微惡寒飲濁上干咳吐涎沫且食減胃衰寒疝竊踞陰濁見症豈止一端喻嘉言謂濁陰上加於天非離照當空氛霧焉得退避反以地黃五味陰藥附和其陰陰霾沖逆肆虐飲邪滔天莫制議以仲景熟附配生薑法掃群陰以驅飲邪維陽氣以立基本況尊年尤宜急護真陽為主人參茯苓熟附子生薑汁南棗十二月間診得陽微濁飲上干為咳不能臥曾用小青龍湯減去麻黃細辛服後已得著枕而臥想更醫接用不明治飲方法交驚蟄陽氣發泄病勢更熾頃診脈來濡弱無神痰飲咳逆未已諒非前法可效宗仲景真武湯法以熟附配生薑通陽逐飲立法真武湯去白朮加人參脈弦右澀面亮舌白口乾不喜飲頭重岑岑然胸脘痹塞而痛得噯氣稍舒酒客谷少中虛痰飲聚蓄當此夏令地氣上升飲邪挾氣上阻清空遂令前症之來金匱云脈弦為飲色鮮明者為留飲口乾不欲飲水者此為飲邪未去故也況漐漐汗出豈是風寒春夏溫邪辛溫發散為大禁自云身體空飄年已六旬有四辛散以泄其陽不亦左乎半夏薑汁川連吳萸茯苓枳實竹瀝遠客路途風寒外受熱氣內蒸痰飲日聚於臟之外脈絡之中凡遇風冷或曝烈日或勞碌身體心事不寧擾動絡中宿飲飲泛氣逆咳嗽氣塞喉底胸膈不思食物著枕嗆吐稠痰氣降自愈病名哮喘伏飲治當得宜除根不速到老年仍受其纍耳小青龍湯去細辛冬溫陽不潛伏伏飲上泛仲景云脈沉屬飲面色鮮明為飲飲家咳甚當治其飲不當治咳緣年高下焦根蒂已虛因溫暖氣泄不主收藏飲邪上擾乘肺肺氣不降一身之氣交阻熏灼不休絡血上湧經云不得臥臥則喘甚痹塞乃肺氣之逆亂也若以見病圖病昧於色診候氣必致由咳變幻腹腫脹滿漸不可挽明眼醫者勿得忽為泛泛可也茲就管見略述大意議開太陽以使飲濁下趨仍無礙於冬溫從仲景小青龍越脾合法杏仁茯苓苡仁炒半夏桂枝木石膏白芍炙草伏飲陰濁上干因春地氣主升而發嘔吐不飢自然脾胃受傷六君子宣補方法未嘗不妙今診得吸氣甚微小溲晨通暮癃足跗浮腫其腑中之氣開闔失司最慮中滿夫太陽司開陽明司闔濁陰瀰漫通腑即是通陽仿仲景開太陽一法牡蠣澤瀉防己茯苓五味乾薑夏至節兩關脈弦長五火燔燎而肝陽胃陽尤甚動怒抽掣為肝病食辛香厚味即病至胃病使然痰火根深非頃刻可除惟靜養勿恚忿薄味以清裡此病發之勢必緩由漸加功議藥乃近理治法羚羊角犀角川連鬱金山梔北秦皮牛黃膽星橘紅生石膏寒水石金箔方諸水法丸竹葉燈心湯送下病起痰飲漸為咳嗽外寒遇勞倦即發發必胸膈氣脹吐出稀涎濁沫病退則痰濃氣降乃已凡飲邪皆陰濁凝聚兩年之久漸漸腹中痞悶妨食肛門尻骨坐則無恙行動站立時時氣墜若欲大便顯系腎虛不能收攝惑於在前見痰治嗽苟非辛解即屬寒降乃致養成錮疾腎氣湯加紫衣胡桃沉香汁痞日前議用辛潤下氣以治肺痹謂上焦不行則下脘不通古稱痞悶多屬氣分之郁也兩番大便胸次稍舒而未為全爽此豈有形之滯乃氣鬱必熱陳腐黏凝膠聚故脘腹熱氣下注隱然微痛法當用仲景梔子豉湯解其陳腐鬱熱暮臥另進白金丸一錢蓋熱必生痰氣阻痰滯一湯一丸以有形無形之各異也黑山梔鬱金香豉桃仁杏仁栝蔞皮降香白金丸面垢油亮目眥黃頭脹如束胸脘痞悶此暑濕熱氣內伏因勞倦正氣泄越而發既非暴受風寒發散取汗徒傷陽氣按脹形濡澀豈是表症凡傷寒必究六經伏氣須明三焦論症參脈壯年已非有餘之質當以勞倦損傷伏邪例診治滑石黃芩厚朴醋炒半夏杏仁蔻仁竹葉因驚而得邪遂入肝故厥後熱神色昏狂診得面青舌白微嘔渴飲胸次按之而痛此屬痞結乃在裡之症宗仲景以瀉心湯為法川連半夏乾薑黃芩人參枳實瘧母用針是泄肝膽結邪瘦人瘧熱傷陰夢遺五心煩熱亦近理有諸繼患脘膈痞悶不飢大便不爽食減乃氣滯於上與前病兩歧焉得用滋陰凝滯之藥思必病後飲食無忌中焦清濁不和所致杏仁土栝蔞桔梗半夏黑山梔枳實香附汁精氣內損是皆臟病萸地甘酸未為背謬緣清陽先傷於上柔陰之藥反礙陽氣之旋運食減中痞顯然明白病人食姜稍舒者得辛以助陽之用也至於黃耆麥冬棗仁更蒙上焦斯為背謬姑議辛甘理陽可效桂枝湯去芍加茯苓疝按七疝治法最詳子和其旨辛香以泄肝得氣疏泄而病緩矣按法調理不愈七味導引納腎益氣升舉脾陽而墜氣仍然艾灸蒸臍原得小安內經任脈為病男子內結七疝女子帶下瘕聚同為奇經主之故疏泄諸方能治氣實參朮升補僅治中虛下陷與元海奇經中病無補壯歲至老病根不輟下焦日衰可知升陽一法體症頗合衰年僅可撐持勿使病加可矣生鹿茸鹿角霜當歸生菟絲子沙蒺藜川桂枝尖肝病絡虛氣聚少腹滯脹前用河間金鈴子散加牡蠣橘葉合鹹辛苦勝法小效加食述飢則脅腹鳴盛而濁氣下泄頗安乃絡虛不足中之有餘形質瘦怯不可純攻桃仁當歸梢炒小茴橘核郁李仁南山楂蔥白汁丸脈右弦左澀當臍痛連少腹已屬凝聚有形嘔吐黃濁大便欲解不通若患處有漉漉聲痛勢稍減惟外著體不轉移其痛更加此屬肝氣疝瘕辛香流氣所稱通則不痛耳炒桃仁炒橘核金鈴子炒延胡韭白汁兩頭尖小茴青皮疝結少腹按之堅凡過飢必衝突至脘吐酸䐜脹述病從怒勞而得內應乎肝肝逆犯胃飢則胃弱肝乘上噯下泄氣則減肉桂真橘核青木香小茴穿山甲粗桂枝李根白皮七疝在肝內經謂衝脈為病但衝脈隸於陽明肝木必乘克胃土胃翻湧逆致吐蛔嘔吐湯飲不入厄忒不止皆逆亂無已為臟厥危疴矣肝體本剛相火內寄一派熱燥藥餌以剛濟剛竟有缺折之虞欲泄其濁擬用朱南陽法韭白根兩頭尖金鈴子延胡歸鬚肉桂心痛自腎囊漸踞少腹之左夫厥陰之脈繞乎陰器操持謀慮都主傷肝一氣結聚變幻形象而痛病名曰疝疝分有七暴疝多寒久疝多熱泄氣痛緩宣通可以卻病只因下焦乃深遠之鄉氣熱濕鬱概可知矣川連小茴黑山梔橘核川楝子青木香郁李仁冬葵子瘧母十年沉痼宿疴藥不能效夫瘧邪既久邪與氣血兩凝結聚絡脈藥難入絡耳瘧不離乎肝膽疝不外乎肝病七疝子和分部大著虛質不可專以辛香下墜為甚議有情溫通以培生氣鹿茸大茴香穿山甲當歸水安息香炮黑川烏全蠍脈沉痰多手體赤瘡宿疝在下右脅氣墜少腹前議控涎丹逐痹未應想久聚濕熱沉痼非皮膜經脈之壅用浚川丸四十粒勻二服間日一進竟通腑聚惟通腑宣壅黏痰既下其疝仍聚於右且盛於寒天冬月臥安必有聲自能行走勞動必有形直墜陰囊久病急攻無效議辛甘化風方法古人以疝為肝病十居八九當歸鹿角桂枝肉桂小香茴川芎炙草茯苓生薑羊肉膠丸男子結疝在內經則曰衝任為病子和統論疏肝今疝未愈臍右腹高突硬起乃由疝漸至瘕聚腸覃之屬夫腸覃者寒氣客於大腸與胃氣相搏大腸與肺表裡傳送肺氣寒則氣凝不行清氣散而濁氣結為瘕遷延日久如懷胎妊按之堅推之移氣病而血不病也穿山甲椒目桂枝川楝子小茴香茯苓麝香白芥子高年疝症是下元虛氣冷凝沍結聚攻墜乃沉痼之疾藥難取效暖氣助陽鼓動俾陰邪濁氣稍解不過暫時小安耳病在肝腎道路紆遠藥必從咽入胃由胃入腸始達病所而上中無病之處必受疝藥攻克之纍倘胃減妨食何以救療夫陰濁盤踞成形例取純陽氣雄之藥昔胡大封翁高年宿疝用十全大補不效喻氏駁其半陰半陽非法議以姜附為丸參苓為衣喉間知有參苓過胃始露猛烈之威靈恰攻病所此議甚正生炮附子淡乾薑大茴香炒研為細末真水安息香搗為小丸以人參末為衣積聚騎射馳驟寒暑勞形皆令陽氣受傷三年來右胸脅形高微突初病脹痛無形久則形堅似梗是初為氣結在經久則血傷入絡蓋經絡繫於臟腑外廓猶堪勉強支撐但氣鈍血滯日漸瘀痹而延癥瘕怒勞努力氣血交亂病必旋發故寒溫消克理氣逐血總之未能講究絡病工夫考仲景於勞傷血痹諸法其通絡方法每取蟲蟻迅速飛走諸靈俾飛者升走者降血無凝著氣可宣通與攻積除堅徒入臟腑者有間録法備參末議蜣螂蟲䗪蟲當歸鬚桃仁川鬱金川芎生香附煨木香生牡蠣夏枯草病後食物失和腸中變化傳導失職氣滯釀濕鬱而成熱六腑滯濁為之聚昔潔古東垣輩於腸胃病每取丸劑緩攻當仿之川連蘆薈雞肫皮煨木香小青皮萊蔔子南山楂紫厚朴蒸餅為小丸嗔怒強食肝木犯土腹痛突如有形緩則泯然無跡氣下鳴響皆木火餘威乃瘕疝之屬攻伐消導必變腹滿以虛中挾滯最難速功近日痛瀉恐延秋痢丁香厚朴茯苓炒白芍廣皮煨益智仁據述瀉血五日血止即患咳嗆左脅下有形如梗身動行走必眩暈欲僕春夏減食秋冬稍加交冬人迎脈絡結癭診脈虛左關尺數此肝腎精血因驚恐憂勞所傷陽失陰戀絡中空隙陽化內風鼓動不息日就消爍不肯復為郁勞之症四旬以外生氣已淺非治病可卻春夏身中真氣不耐發泄可知屏絶家務關懷頤養望其病緩石決明女貞實杞子黑芝麻桑葉阿膠寄生柏子仁茯苓炒當歸宿瘕在脅下亦與肥氣相類自述因嗔怒蓋肝之積也久鬱氣血不通肝藏內寄相火時當夏令泛潮苦雨脾胃受濕自必困倦肝木橫克脾土脹勢日滿所受濕邪漫無出路蒸於腸胃黏膿積滯利不肯爽中焦不和寤不得逸症屬難治且議分消白朮厚朴茯苓豬苓茵蔯通草病始足脛乃自下焦肝腎起病其形不腫則非六氣濕邪當從內損門痿躄推求萸地滋滯久服胃傷食減嘔逆皆因濁味滯氣而然經年不復損者愈損臟真不能充沛奇經八脈不司其用經云衝脈為病男子內結七疝女子帶下瘕聚夫衝脈即血海男子藏精女子系胞今精瀝內結有形是精窒氣結亦猶女子之瘕聚也凡七疝治法後人每宗張子和但彼悉用辛熱與今之精窒氣結迥殊久病形消肉脫議以精血有情涵養生氣用鮮河車水煮搗爛入山藥建蓮丸如桐子大清晨人參湯送下據述左脅痛引胸部虛里穴中按之有形納食不得順下頻怒勞煩氣逆血鬱五旬以外精力向衰延久最慮噎膈議宣通氣血藥取辛潤勿投香燥即有瘀濁凝留亦可下趨當歸尾京墨汁桃仁泥延胡索五靈脂老薤白痹病者長夏黴天奔走內踝重墜發斑下焦痛起繼而筋掣及於腰窩左臂經云傷於濕者下先受之夫下焦奇脈不流行內踝重著陰維受邪久必化熱爍血風動內舍乎肝膽所謂少陽行身之側也診得右脈緩左脈實濕熱混處血絡之中搜逐甚難此由濕痹之症失治延為痿廢沉疴矣三年病根非倉猝迅攻姑進先通營絡參之奇經為治考古聖治痿痹獨取陽明惟通則溜邪可拔耳鹿角霜生白朮桂枝茯苓撫芎歸鬚白蒺藜黃菊花四肢經隧之中遇天冷陰晦疼痛拘攣癰疽瘍潰膿其病不發瘍愈病復至抑且時常衄鼽經以風寒濕三氣合而為痹然經年纍月外邪留著氣血皆傷其化為敗瘀凝痰混處經絡蓋有諸矣倘失其治年多氣衰延至廢棄沉疴當歸鬚乾地龍穿山甲白芥子小撫芎生白蒺藜酒水各半泛丸從來痹症每以風寒濕三氣雜感主治召恙之不同由乎暑暍外加之濕熱水穀內蘊之濕熱外來之邪著於經絡內受之邪著於腑絡故辛解汗出熱痛不減余以急清陽明而致小愈病中復反者口鼻復吸暑熱也是病後宜薄味使陽明氣爽斯清陽流行不息肢節脈絡舒通而痿痹之根盡拔至若溫補而圖速效又非壯盛所宜人參茯苓半夏廣皮生於術枳實川連澤瀉竹瀝薑汁泛丸風濕腫痹舉世皆以客邪宜散愈治愈劇不明先因勞倦內傷也蓋邪之所湊其氣必虛參朮益氣佐以風藥氣壯托出其邪痛斯止矣病人自云手足如墮如無詎非陽微不及行乎四末乎此皆誤治致參藥過費耳人參生於術黃耆歸身肉桂炙草煨姜南棗風濕客邪留於經絡上下四肢流走而痛邪行觸犯不拘一處古稱周痹且數十年之久豈區區湯散可效凡新邪宜急散宿邪宜緩攻蜣螂蟲全蠍地龍穿山甲蜂房川烏麝香乳香以無灰酒煮黑大豆泛丸左脈弦大面赤痰多大便不爽此勞怒動肝令陽氣不交於陰陽維陽蹻二脈無血營養內風爍筋跗廉痹痛暮夜為甚者厥陰旺時也病在脈絡金斛晚蠶沙漢防己黃柏半夏萆薢大檳榔汁冬月溫暖真氣未得潛藏邪乘內虛而伏因驚蟄節春陽內動伏氣乃發初受風寒已從熱化兼以夜坐不眠身中陽氣亦為泄越醫者但執風寒濕三邪合成為痹不曉病隨時變之理羌防葛根再泄其陽必致增劇矣焉望痛緩議用仲景木防己湯法木防己石膏桂枝片薑黃杏仁桑皮煩勞鬱勃之陽變現熱氣內風內經以熱淫風消必用甘寒前議謂酒客不喜甘味且痰多食少亦忌甘膩滋滯用清少陽膽熱者酒氣先入肝膽也酒汁濕著腸胃受之理腸以通胃胃腸氣機流行食加滑泄頗膩今者氣熱當午上冒經絡痹痛亦減於平日主以和陽甘寒宣通經脈佐之童桑羚羊角天門冬枸杞子白蒺藜丹皮茯苓霍山斛共熬膏辛香走竄宣通經隧壅結氣分之濕有卻病之能無補虛之益大凡藥餌先由中宮以布諸經中焦為營氣之本營氣失養轉旋自鈍然攻病必藉藥氣之偏朝夕更改豈是去疾務盡之道另於暮夜進營養一帖人參茯苓桂枝木炙草當歸炒白芍南棗周禮採毒藥以供醫事蓋因頑鈍沉痼著於驅殼非臟腑虛損故必以有毒攻拔使邪不留存凝著氣血乃效既效矣經云大毒治病十去其五當此只宜愛護身體勿勞情志便是全功道理愚人必曰以藥除根不知天地之氣有勝有復人身亦然谷飲養生可御一生藥餌偏勝豈可久服不觀方士煉服金石丹藥疽發而死者比比何首烏黑芝麻桑枝桂枝湯泛丸用養肝血熄風方右指仍麻行走則屈伸不舒戌亥必心熱煩蒸想前法不效杞歸辛溫陽動風亦動矣議去辛用鹹若疑慮途次瘧邪未盡致脈絡留滯兼以通逐緩攻亦妙熟地龜膠阿膠秋石天冬麥冬五味茯神密丸晨服桃仁穿山甲乾地龍撫芎歸鬚丹皮紅花沙苑香附汁丸夜服背痛得按摩愈痛吐涎沫短氣腹滿小腹堅小便不通大便自利下身麻木不得移動不食不寐煩則汗出病機多端無縷治成法思冷濁竊踞陽微不行為痞塞之象二氣既乖豈可忽略引仲景少陰例急進通陽為要議用白通加人尿豬膽汁湯去須蔥白淡乾薑生炮附子人尿豬膽汁調下脈弦右大弦則為飲大則胃陽已虛緣操持縈思積勞陽虛致不飢不食勉納食物不運瞋怒兼以夜臥不安多寤少寐恍惚中心憹懊忽而腹鳴氣震四肢筋骱痿弱無力起病時晨必寒痙足跗微冷按是脈症有年陽虛為本而痰飲氣逆因虛而聚夫虛則生寒實則生熱寢食不安將及半載已交四之氣中長夏濕土乘侮脾胃慮及肌腫腹脹故周身束筋利機陽明胃脈是賴閲醫藥氣血淆混寒熱互投不以陰陽偏著調理宜乎不應議通補理胃陽為主疏肝為輔氣宣陽蘇何慮痰濁之矇昧以茯苓飲法減術合薛氏星附六君子意人參茯苓香附蘇梗白附半夏薑汁陳皮周身掣痛頭不可轉手不能握足不能運兩脈浮虛浮雖風象而內虛者脈亦浮而無力以脈參症當是勞倦傷中陽明不治之候陽明者五臟六腑之海主束筋骨而利機關陽明不治則氣血不榮十二經絡無所稟受而不用矣衛中空虛營行不利相搏而痛有由然也法當大補陽明氣血不與風寒濕所致成痹者同治人參黃耆歸身甘草桂枝木秦艽白朮長夏濕痹經脈流行氣鈍兼以下元脈絡已虛痿弱不能走趨脊膂常似酸楚大便或結或溏都屬肝腎奇經為病蓋必佐宣通脈絡為正治法倘徒呆補夏季後必滋濕擾須為預理肉蓯蓉小茴香巴戟天歸身遠志鹿角霜桑椹子生茅朮茯苓熟地金毛狗脊煎膏和丸脈微而澀微為陽氣虛澀為陰血傷去冬已下肢獨冷步趨無力高年內乏藏納之司入夏身動加喘肉腠麻痹若蟲行此真陽失蟄胃陽失護生生意少豈攻病藥石所宜喻嘉言先生所謂大封大固莫令真陽泄盡而暴脫皆為此也録嚴氏三因方人參白朮附子據述緣季秋外邪變瘧延及百日始愈凡秋瘧是夏月暑濕熱內伏新涼外觸引動伏邪而發俗醫但知柴葛解肌暑濕傷在氣分因藥動血血傷攣痹筋熱則弛筋寒則急遂至釀成痿痹難效症當歸身桑寄生生虎骨枸杞子川撫芎沙苑蒺藜血傷驟加驚恐氣鬱熱升風旋清神受蒙為厥凡厥皆隸厥陰今左股麻痹忽爽忽迷皆肝膽中相火內風未得寧靜病延數日左脈小濡熱勝津液暗傷不宜純與攻滌苦寒經旨以肝為剛臟與胃腑對待柔緩濡潤陽和液復可免癇症鮮生地石菖蒲柏子仁阿膠天冬茯神偏枯症風論云邪中五臟六腑之俞穴各入門戶為病則四肢不舉然陽主左而陰主右也又云汗出偏沮使人偏枯此外感之邪或營衛皆虛邪乘虛入或虛風內動皆有之醫者治之當補正以逐邪未可逐邪而不顧本元然治之之法以陽明為主生耆白芍當歸防風續斷萆薢蠶砂橘紅虎骨秦艽痿下焦痿躄先有遺泄濕瘍頻進滲利陰陽更傷雖有參耆朮養脾肺以益氣未能救下即如畏冷陽微幾日飯後吐食乃胃陽頓衰應乎外陽失職但下焦之病多屬精血受傷兩投柔劑溫通之補以腎臟惡燥久病宜通任瞀通攝兼施亦與古賢四斤金剛健步諸法互參至於胃藥必須另用夫胃腑主乎氣氣得下行為順東垣有升陽益胃之條似乎相悖然芩連非苦降之氣味乎凡吐後一二日暫停下焦血分藥即用扶陽理胃二日俾中下兩固經旨謂陽明之脈束筋骨以利機關諒本病必有合矣鹿茸淡蓯蓉當歸杞子補骨脂巴戟尖牛膝柏子仁茯苓川斛長夏濕熱經脈流行氣鈍兼以下元絡脈已虛痿弱不耐步趨常似酸楚大便或結或溏都屬肝腎為病然益下必佐宣通脈絡乃正治之法徜徒呆補恐季夏後濕熱還擾須為預理鹿角霜當歸生茅朮熟地茯苓桑椹子蓯蓉巴戟遠志小茴金毛狗脊酒蒸水熬膏和丸淡鹽湯送下痿躄在下肝腎病多但素飲必有濕熱熱瘀濕滯氣血不行筋縮肌肉不仁體質重者難移無非濕邪之深沉也若論陽虛不該大發瘡痍但久病非速攻莫計效遲方可愈疾細生地咸蓯蓉當歸鬚牛膝黃柏生刺藜川斛萆薢色蒼脈實體質堅壯雖年逾四旬氣元充旺詢知平日喜啖酒醴甘肥此釀成濕火蘊結下焦今少腹微腫硬二便帶澀自覺少腹氣脹下衝兩足沉重艱於步履腿股皮中甚熱即內經所云濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿也更述曾因熬煉膏藥中有䗪蟲蜈蚣等物吸受穢濁毒氣未始非與濕熱糾蓄沉伏下焦前議苦辛寒燥茲再佐以搜逐絡隧然此病從口而入必茹素戒飲一二年之久綿茵蔯黃柏川萆薢茯苓皮金鈴子穿山甲大檳榔汁金瘡去血乃經脈營絡之傷若損及臟腑倏忽莫救後此嗔怒動肝屬五志中陽氣逆迸與客邪化火兩途苦辛泄氣頻服既多陽遂發泄形雖若豐盈而收藏固攝失職少腹約束陽道不舉背脊喜靠步履無力皆是痿弱症端漸至痿廢議以通納之法專事涵養生真冀下元之陽八脈之氣收者收通者通庶乎近理鹿角霜淡蓯蓉干生菟絲粉生杜仲粉歸身五味大茴香遠志家韭子覆盆子雲茯苓蒜汁泛丸五旬又四陽氣日薄陽明脈絡空乏不司束筋骨以流利機關肩痛痹麻頭目如蒙行動痿弱無力此下虛上實絡熱內風沸起當入夏陽升為甚燥濕利痰必不應病議清營熱以熄內風犀角鮮生地元參心連翹心冬桑葉丹皮鉤藤明天麻勉強搖精致陽縮囊縱不但形質傴僂肛門臍竅皆為收引咽喉牽絆自此食物漸漸減少由精血之傷有形最難自復少厥兩陰脈循喉嚨開竅於二陰既遭損傷其氣不及充注於八脈見症皆拘束之狀上年進柔劑陽藥服後頭巔經脈皆脹耳竅愈鳴想是藏陰宜靜試以乘輿身怖必加局促不安宜乎升陽之動藥不靈矣夫少陰內藏原有溫蒸諸法厥陰相火內寄惡寒喜涼仿丹溪潛陽法仍候高明定議元武板知母茯苓秋石生地阿膠遠志炭柏子仁又交四之氣熱勝元虛則氣候不耐久坐舌心腐碎吸短氣似不接續中焦喜按始得暢安目胞欲垂難舒四肢微冷失和從前調理見長每以溫養足三陰兼進血氣充形之品病減今當長夏脾胃主氣氣泄中虛最防客氣之侵是質重之補宜緩而養胃生津寧神斂液仍不可少俟秋深天氣下降仍用前法為穩擬逐日調理方法人參麥冬知母天冬茯神甘草川斛建蓮當夏季反復變幻因天地氣機大泄體氣久虛無以主持故見病治病則無功而安中納下每每獲效入秋常服附子七味丸頗安秋分節天氣降地氣收緣火熱氣傷虛體未能收肅是以肢節時寒頭巔欲冷無非病久諸氣皆餒斯外衛之陽少護液髓暗枯則血脈不營而陰乏內守凡此皆生氣之漸鮮也急當溫養益氣填補元形使秋令助其收藏預為來春生髮之用按內經有四氣調神法即今投藥亦當宗此旨鹿胎熟地五味子麥冬人乳粉蓯蓉黃狗腎柏子仁青鹽交冬宜藏老年下虛二氣少續忽然右瘓舌喑面亮戴陽呵缺吸氣短欲嗆此非外來客邪皆根本先怯平昔眩暈肝藏虛風顯然水不生木坎中真陽內寓必溫理其下凡陽主乎通陰主乎攝扶過七日少陽主氣再振望其偏廢延永倘攻風劫痰之治非本氣自病法則人參熟附遠志茯神鮮菖蒲搗汁沖高年液涸風動酒濕氣蒸足趾曾經腐瘍經年來或麻痹或牽掣不能轉側已成筋骨之痿兼之火升眩暈頭面清竅常似不爽大便艱澀四五日始一更衣陽氣不能潛伏陰液日就枯槁老來痿躄原無復元之法診得脈數動疾溫燥之補無益反害仿丹溪虎潛之制稍為加減冀得津液少存亦安閒永年之算非攻病也大生地淡天冬肉蓯蓉淮牛膝生白芍虎骨膠柏子仁肥知母川黃柏痙厥經云煩勞則張精絶闢積於夏令人煎厥夫勞動陽氣弛張則陰精不司留戀其陽雖有若無故曰絶積之既久逢夏季陽正開泄五志火動風生若煎熬者然斯為暈厥耳治法以清心益腎使肝膽相火內風不為暴起然必薄味靜養為穩連翹心元參心竹葉心知母細生地生白芍腎厥由背脊而升發時手足逆冷口吐涎沫喉如刀刺蓋足少陰經脈上循喉嚨挾舌本陰濁自下上犯必循經而至仿許學士椒附意通陽以泄濁陰耳炮附子淡乾薑川椒胡盧巴半夏茯苓薑汁泛丸臍上心下熱熾咽喉間陳腐氣遂神昏僕厥經時汗出而醒病來口湧血沫乃膻中熱擁以致心竅受蒙若非芳香清透不能宣通絡中瘀痹天竹黃丹參鬱金云茯神石菖蒲生烏犀角麝香冰片野赤豆皮煎湯泛丸竹葉湯送下食後服厥屬肝病幾番病發都因經水適來夫血海貯聚既下斯衝脈空乏而風陽交動厥之暴至之因由也鹹寒濡潤亦和陽泄內風之義治之未應下焦獨冷喉嗆胸痹思衝脈乃陽明所屬陽明虛則失闔厥氣上犯莫遏內經治肝不應當取陽明制其侮也暫用通補入腑取乎腑以通為補小半夏湯加白糯米諸厥皆隸厥陰疝瘕心熱脅脹中消便難乃肝陽內風妄動消爍犯及陽明矣經言治肝不應當取陽明肝胃一臟一腑相對不耐溫補者是肝用太過肝體不及也九孔石決明淮小麥清阿膠細生地天冬茯苓脈左動如數右小濡弱病起嗔怒即寒熱汗出心悸繼而神魂自覺散越夫肝臟藏魂因怒則諸陽皆動所見病源無非陽動變化內風為厥故凡屬厥症多隸厥陰肝病考內經治肝不外辛以理之酸以治之甘以緩急今精采散失鎮固收攝猶慮弗及而方書泄肝平肝抑肝方法盡多至於補法多以子母相生為治此病全以肝腎下焦主治為正所服醫藥並無師古之方未識何見阿膠雞子黃人參生地金箔冷自足上貫於心初起周身麻木今則口鼻皆是冷氣病起驚恐內傷肝腎為厥衝脈隸於肝腎二臟失藏沖氣沸亂其脈由至陰而上故多冷耳淡蓯蓉熟地炭五味子紫石英茯苓牛膝癲癇平昔操持身心皆動悲憂驚恐情志內傷漸漸神志恍惚有似癲癇其病不在一臟矣醫藥中七情致損二千年來從未有一方包羅者然約旨總以陰陽迭偏為定評凡動皆陽當宗靜以生陰是議陽乘於絡陰脈不安斂鎮攝固久進可效家務見聞必宜屏絶百日為期人參廉珠茯神棗仁炙草生龍骨萸肉五味三消肌肉瘦減善飢渴飲此久久煩勞壯盛不覺體衰病發皆內因之症自心營肺衛之傷漸損及乎中下按脈偏於左搏營絡虛熱故苦寒莫制其熱甘補無濟其虛是中上消之病犀角鮮生地元參心鮮白沙參麥冬柿霜生甘草鮮地骨皮渴飲頻飢溲溺渾濁此屬腎消陰精內耗陽氣上燔舌碎絳赤乃陰不上承非客熱也此乃臟液無存豈是平常小恙熟地萸肉山藥茯神牛膝車前濁飲不解經謂之膈消即上消症也言心移熱於肺火刑金象致病之由操心太過刻不寧靜當卻盡思慮遣懷於栽花種竹之間庶幾用藥有效生地天冬棗仁人參柏子仁知母金石斛生草元參善食而飢乃疸成消中膏粱蘊熱過也禁芳草藥石藥石發癲芳草發狂耳自應清胃淡薄蔬食庶可獲愈蔞皮枳殼川連鬱金金石斛連翹焦神面郁因悒鬱動肝致病久則延及脾胃中傷不納不知味火風變動氣橫為痛為脹疏泄失職便祕忽瀉情志之郁藥雖霍然數年久病而兼形瘦液枯若再香燥劫奪必致格拒中滿與辛潤少佐和陽柏子仁歸鬚桃仁生白芍小川連川楝子因抑鬱悲泣致肝陽內動陽氣變化火風有形有聲貫膈沖咽自覺冷者非真寒也內經以五志過極皆火但非六氣外來芩連之屬不能制伏固當柔緩以濡之合乎肝為剛臟濟之以柔亦和法也生地天冬阿膠茯神川斛牡蠣小麥人中白熬膏鬱勃日久五志氣火上升胃氣逆則脘悶不飢肝陽上僭風火凌竅必旋暈咽痹自發冷者非真寒也皆氣痹不通之象病能篇以諸禁鼓栗屬火丹溪謂上升之氣從肝膽相火非無據矣生地阿膠玄參丹皮川斛穭豆皮郁損心陽陽墜入陰為淋濁由情志內傷即為陰虛致病見症亂治最為庸劣心藏神神耗如憒諸竅失司非偏寒偏熱藥治必得開爽冀有向安服藥以草木功能恐不能令其歡悅人參桔梗烏藥木香天冬夜服白金丸情懷悒鬱五志熱蒸痰聚阻氣脘中窄隘不舒脹及背部上焦清陽欲結治肺以展氣化怡以恰悅開懷莫令郁痹綿延鮮枇杷葉杏仁栝蔞皮鬱金半夏茯苓薑汁竹瀝老年情志不適鬱則少火變壯火知飢脘中不爽口舌糜爛心脾營損木火劫爍精華飢肉日消惟怡悅開爽內起鬱熱可平但執清火苦寒非調情志內鬱熱矣金石斛連翹心炒丹皮經霜桑葉川貝茯苓病起憂慮上損兩年調理幾經反復今夏胸心右脅之間常有不舒之象此氣血內郁少展支脈中必有痰食氣阻是宣通流暢脈絡夏季宜進商矣天竺黃茯神鬱金橘紅遠志石菖蒲丹參琥珀竹瀝法丸情志連遭鬱勃臟陰中熱內蒸舌絳赤糜乾燥心動悸若飢食不加餐內傷情懷起病務以寬懷解釋熱在至陰咸補苦瀉是為醫藥雞子黃清阿膠生地知母川連黃柏驚惶忿怒都主肝陽上冒血沸氣滯瘀濁宜宣通以就下因誤投止塞舊瘀不清新血入瘀絡中匝月屢屢反復究竟肝膽氣血皆郁仍宜條達宣揚漏腸在肛得體中稍健設法旋覆花新絳青蔥管炒桃仁柏子仁客邸懷抱不舒肝膽郁遏升降失度氣墜精開為遺泄地萸龍牡鈍澀氣藥者更郁理氣和肝獲效未經調理全功當今冬令溫舒收藏之氣未堅失血之後胸中隱隱不暢未可凝陰只宜降氣和血鉤藤鉤降香米仁鬱金茯苓杜蘇子丹皮炒桃仁腫脹初因面腫邪干陽位氣壅不通二便皆少桂附不應即與導滯滯屬有質濕熱無形入肺為喘乘脾為脹六腑開闔皆廢便不通爽溺短渾濁時或點滴視其舌絳口渴腑病背脹臟病腹滿更兼倚倒左右腫脹隨著處為甚其濕熱布散三焦明眼難以決勝矣經云從上之下者治其上又云從上之下而甚於下者必先治其上而後治其下此症逆亂紛更全無頭緒皆不辨有形無形之誤姑以清肅上焦為先飛滑石大杏仁生苡仁白通草鮮枇杷葉茯苓皮淡豆豉黑山梔殼診脈右大而緩左手小數促冬季寒熱身痛汗出即解自勞役飢飽嗔怒之後病勢日加面浮足腫呼吸皆喘目淚鼻衄臥著氣衝欲起食納留中不運時序交夏脾胃主候睹色脈情形中滿脹病日來矣蓋此症屬勞倦致損初病即在脾胃東垣云胃為衛之本脾乃營之源臟腑受病營衛二氣晝夜循環失度為寒為熱原非瘧邪半表半裡之症斯時若有明眼必投建中而愈經言勞者溫之損者益之建中甘溫令脾胃清陽自立中原砥定無事更遷仲景亦謂男子脈大為勞則知內經東垣仲景垂訓真規矩準繩至法且汗泄積勞都是陽傷醫藥辛走劫陽苦寒敗胃病人自述飲蔗即中脘不舒頃之少腹急痛便稀其胃陽為辛苦大傷明甚又述咳頻沖氣必自下上逆夫衝脈隸於陽明胃陽傷極中乏坐鎮之真氣衝脈動則諸脈皆動濁陰散漫上布此臥著欲起矣愚非遙指其脈正合內經濁氣在上則生䐜脹太陰所至為腹脹相符也有昔見痰休治痰見血休治血當以病因傳變推求故辨論若此厚朴杏仁人參茯苓蜜煨姜南棗壯盛年歲形消色奪診脈右小促左小弦徑病起上年秋季脘中卒痛有形梗突病後陡遇驚觸漸次食減不適食入不運停留上脘腹形脹滿甚則脅肋皆脹四肢不暖暮夜漸溫大便旬日始通便後必帶血出清早未食自按臍上氣海有瘕形甚小按之微痛身動飲水寂然無蹤天氣稍冷爪甲色紫細推病屬肝脾氣血不通則為郁遏久則陽微痹結上下不行有若否卦之義閲醫藥或消或補總不見效者未知通陽之奧耳薤白桂枝栝蔞仁生薑半夏茯苓平昔濕痰阻氣為喘茲因過食停滯陰臟之陽不運陽腑之氣不通二便不爽跗腫腹滿診脈沉弦是由水寒痰滯阻遏氣分上下皆不通調當從三焦分治頃見案頭一方用菟絲子升少陰吳茱萸泄厥陰不知作何解釋不敢附和仍用河間分消定議大杏仁萊蔔子豬苓澤瀉葶藶子厚朴桑白皮廣皮細木通兩年初秋發瘍脈絡氣血不為流行而腹滿重墜臥則頗安臍左動氣臥則尤甚吐冷沫常覺冷氣身麻語塞肝風日熾疏泄失職經以肝病吐涎沫木侮土位自多䐜脹丹溪云自覺冷者非真冷也兩次潰瘍之後剛燥熱藥似難進商議以宣通肝胃為治有年久恙貴乎平淡矣雲茯苓三角胡麻厚橘紅嫩鉤藤熟半夏白旋覆花脈微而遲色衰萎黃蟹為介屬鹹寒沉降凡陽氣不足者食之損陽其致病之由自試二次矣久利久泄古云無不傷腎今浮腫漸起自下是水失火而敗若非暖下徒見瀉泄有紅為脾胃濕熱必致中滿敗壞生茅朮熟地炭熟附子淡乾薑茯苓車前子脈左弦右浮澀始因脘痛貫脅繼則腹大高凸納食減少難進二便艱澀不爽此乃有年操持縈慮太甚肝木怫鬱脾土自困清濁混淆脹勢乃成蓋臟真日納腑陽不運考古治脹名家必以通陽為務若滋陰柔藥微加桂附凝陰沍濁豈是良法議用局方禹糧丸暖其水臟攻其穢濁俟有小效兼進通陽剛補是為虛症內傷脹滿治法至於攻瀉劫奪都為有形而設與無形氣傷之症不同也禹餘糧丸今年長夏久熱熱勝陽氣外泄水穀運遲濕自內起漸漸浮腫自下及上至於喘咳不能臥息都是濁水凝痰阻遏肺氣下降之司但小溲不利太陽亦不通調此雖陽虛症若腎氣湯中萸地之酸膩力難下行矣茯苓桂枝木杏仁生白芍乾薑五味生牡蠣澤瀉向有宿痞夏至節一陰來復連次夢遺遂腹形堅大二便或通或閉是時右膝癰腫潰瘍未必非濕熱留阻經絡所致診脈左小弱右緩大面色清減鼻準明亮納食必腹脹愈加四肢惡冷熱自里升甚則衄血牙宣全是身中氣血交結固非積聚停水之脹考古人於脹症以分清氣血為主止痛務在宣通要知攻下皆為通腑溫補乃護陽以宣通今者單單腹脹當以脾胃為病藪太陰不運陽明愈鈍議以緩攻一法川桂枝熟大黃生白芍厚朴枳實淡生乾薑患風三月周身流走作腫手不能握足不能履診其脈浮大而數發熱口乾此陰虛生內熱熱勝則風生況風性善行火熱得之愈增其勢傷於筋脈則縱緩不收逆於肉理則攻腫為楚也生地黃芩黃連紅花羌活左脅有形漸次腹大每投攻下泄奪大便得瀉脹必少減繼則仍然不通頻頻攻下希圖暫緩病中脹浮下部加針刺以扶水之出腫消病仍不去病患六年久已斷想此病之愈要知此病初由肝氣不和氣聚成瘕屢發攻瀉脾胃反傷古云臍突傷脾今之所苦二便欲出痛如刀刺蓋氣脹久下再奪其血血液枯氣愈結矣宣通宜以利竅潤劑琥珀屑麝香大黑豆皮杜牛膝由夏季目黃神倦漸至中焦脹滿延至霜降上吐瘀血下便汙濁按脈弱細不調視色神采不振兼以呼吸帶喘素有寒疾氣逆其宿飲之蓄已非一日當夏三月脾胃主令天氣熱地氣升人身氣泄加以飢飽勞役而遂減食脹滿是皆病於中綿延上下矣夫六腑以通為用不但腑不用事其間經脈絡脈中氣血皆令不行氣壅血瘀脹勢愈加古人治脹病專以宣通為法而有陰陽之殊後之攻劫宣通如神佑舟車禹功等方值此久病淹淹何敢輕試議以專通三焦之陽氣驅其錮蔽之濁陰溫補兼進若不陽氣漸蘇難以擬投引用仲景白通湯去須蔥白乾薑豬膽汁淡附子遺精神傷於上精敗於下心腎不交久傷精氣不復謂之損內經治五臟之損治各不同越人有上損從陽下損從陰之議然必納穀資生俾胃後天得振始望精氣生於穀食自上秋至今日甚乃里真無藏當春令泄越生氣不至漸欲離散從來精血有形藥餌焉能驟然充長攻病方法都主客邪以偏治偏閲古東垣丹溪輩於損不肯復者首宜大進參朮多至數斤謂有形精血難生無形元氣須急固耳況上下交損當治其中若得中蘇加谷繼參入攝納填精斂神之屬方今春木大泄萬花盡放人身應之此一月中急挽勿懈矣參朮膏米飲調送一月來雖經反復參脈症色形生陽頗有根蒂近食蠶豆滯氣腹中微膨食後口味酸濁是久臥重著脾陽運動之機尚少而火升心煩動氣汗出遺精雖減於昔未得平復總是內損已深若調治合宜只要精氣復得一分便減一分病象長夏脾胃主令培土助納為要而精氣散越乃兼攝固之法刻下味酸微膨補脾少佐疏胃宜晚進其早上另制補攝丸劑益臟真以招納散失之氣人參茯苓白朮炙草廣皮麥冬五味神麯麥芽炒黃柏晚服人參桑螵蛸白龍骨淡蓯蓉五味芡實茯神棗仁金箔金櫻膏丸早服肌肉鬆柔脈小如數常有夢遺陰精不固上年冬令過溫溫則腠理反疏陽動不藏諸氣皆升絡血隨氣上溢見症如頭面熱目下肉瞤心悸怔忡四肢汗出兩足附腫常冷不溫走動數武即吸短欲喘何一非少陰腎氣失納陽浮不肯潛伏之徵況多夢紛擾由精傷及神氣法當味厚填精質重鎮神佐酸以收之甘以緩之勿因血以投涼莫見下寒輒進燥熱恪守禁忌以安之經年冀有成功所慮壯年志慮未純貽憂反復水制熟地人參秋石拌白龍骨炒杞子五味炒山藥茯神牛膝炭遺泄有夢屬心無夢屬腎據述氣火下溜即如溺出之狀莖管中痛熱氣上衝咽喉巔頂掀脹語言皆怯此任脈不攝衝脈氣逆治法引之導之攝以固之現在便溏食少勿投沉陰膩滯之藥砂仁炒熟地炒黑遠志肉炒蓮鬚元武版白龍骨鎖陽茯苓杜芡實金櫻子熬膏為丸淋濁由淋痛漸變赤白濁少年患此多有欲心暗動精離本宮腐敗凝阻溺竅而成乃有形精血之傷三年久病形消肉減其損傷已非一臟一腑然補精充髓必佐宣通為是自能潛心安養尚堪帶病延年熟地王麋角蓯蓉遠志赤苓牛膝陰精上承者壽陽火下陷者危血淋久而成形窒痛煩心心火直升老人陰精已憊五液化成敗濁阻竅不通欲泄必痛得泄痛減即痛則不通痛隨利緩之理故知柏六味及歸脾逍遙之屬愈治愈劇其守補升補滋濁澀藥決不中病用琥珀痛減乃通血利竅之意然非久進之方以不傷陰陽之通潤立方生地益母草女貞子阿膠琥珀穭豆皮敗精宿於精關宿腐因溺強出新者又瘀在裡經年纍月精與血並皆枯槁勢必竭絶成勞不治醫藥當以任督沖帶調理亦如女人之崩漏帶下醫者但知八正分清以濕熱治亦有地黃湯益陰泄陽總不能走入奇經鹿茸龜甲當歸杞子茯苓小茴鮑魚案牘神耗過動天君陽隧直升直降水火不交陰精變為腐濁精濁與便濁異路故宣利清解無功數月久延其病傷已在任督凡八脈奇經醫每棄置不論考孫真人九法專究其事欲涵陰精不漏意在升固八脈之氣録法參末鹿茸人參生菟絲子補骨脂韭子舶茴香覆盆子茯苓胡桃肉柏子霜蒸餅為丸用甘露飲淋濁已止而頭暈左肢麻木胃脘腹中飢則欲痛咽喉中似有物黏著咳咯咽痛不解診脈左徑右濡據症是水弱木失滋涵肝陽化風過膈繞咽達巔木乘胃土陽明脈衰不司束筋骨以利機關脘腹中痛得食則緩者胃虛求助也今壯年有此已屬痱中根萌養肝腎之液以熄虛風補胃土以充絡脈務在守常勿圖速效可望全好制首烏蓯蓉天冬杞子柏子霜茯神菊花炭青鹽紅棗肉丸早服晚服豬肚丸方丹溪謂五淋症濕熱阻竅居多三年前曾有是病月前舉發竟有血塊窒塞尿大痛不能溺出想房勞強忍敗精離位變成汙濁瘀腐且少腹堅滿大便祕澀臟氣無權腑氣不用考瀕湖發明篇中有外甥柳喬之病與此適符今仿其義參入朱南陽法兩頭尖川楝子韭白小茴桂枝歸尾衝入杜牛膝根汁肝主筋腎主骨陰器者宗筋之所聚男子天癸未至強通其精異時必有難名之病今患腰痠痛宗筋短縮大便結澀小便淋瀝足腿消爍飭肉拘攣無非肝虧腎損所致按脈沉細而兼微數乃精不營筋又有伏火內經所謂發為筋痿及為白淫者是也治宜滋腎舒肝使精血漸充則筋骨亦漸和柔但幻症日久非一朝一夕之功幸弗期速效熟地歸身牛膝肉桂黃柏線魚膠續斷鉤勾久勞鬱勃夏季尿血延及白露溺出痛澀血凝成塊阻著尿管夫淋症方書列於肝膽部為濕熱阻其宣化氣機故治法苦辛泄肝淡滲通竭施於壯實頗效今望八老翁上焦必憊況加精血自敗化為瘀濁真氣日衰機竅日閉診候之際病人自述夢寐若有交接未嘗遺泄心陽自動相火隨之然清心安腎等法未能速效暫以清營通瘀宣竅之劑天冬生蒲黃龍膽草龜板生地阿膠丹皮焦黃柏男子血淋成塊尿出痛醫治一年罔效夫淋屬肝經鬱火濕熱皆有是病思少壯情欲勉強必致敗精凝竅精腐變瘀理固有諸用虎杖散法服五六日痛減血少晨溺尚有血絲此蓋竅中有未盡之敗濁宜通不宜澀人中白琥珀沉香白牽牛川柏韭菜汁丸濁膩膏淋日下最易損人津液絡脈遂槁況八脈隧道紆遠泛然補劑藥力罔效難經謂十二經屬通渠旋轉循環無端惟奇經如溝渠滿溢流入深河不與十二經並行者也樹根草皮此症亦難奏效須用血肉填補固澀庶可希其獲效麋茸河車人參蒸黑於術茯苓湘蓮縮砂雀卵茹䕡烏賊骨雀卵河車膏為丸淋屬肝膽而酒性濕熱之氣肝膽先受滓汁次及腸胃濕甚熱鬱溺竅氣阻莖管窄溢久病積熱愈深不受溫補當忌酒肉厚味分利雖投不能卻病從經義苦味祛濕參以解毒料豆皮牡丹皮黑山梔蘆薈龍膽草真青黛金銀花胡黃連嘔吐勉強攻胎氣血受傷而為寒熱經脈乏氣而為身痛乃奇經衝任受病而陽維脈不用事也內經以陽維為病苦寒熱維者一身之網維也既非外感羌蘇柴葛三陽之藥及芩梔枳朴之屬辛酸繼以苦寒未能中病胃口屢傷致湯飲皆噦出無餘大便不通已經半月其吐出形色青緑涎沫顯然肝風大動將胃口翻空而腸中汙水得風翔如浪決東西蕩漾矣熄風鎮胃固是定理但危篤若此明理以邀天眷耳淮小麥火麻仁阿膠生地秋石拌人參南棗肉未病先有耳鳴眩暈恰值二氣之交是冬藏根蒂未固春升之氣泄越無以制伏更屬産後精氣未復又自乳耗血血去液虧真陰日損陽氣不交於陰變化內風上巔犯竅沖逆肆橫胃掀吐食攻腸為瀉襲走脈絡肌肉皆腫譬如諸門戶盡撤遂致暴風飄漾之狀醫者辛酸苦降重墜不但病未曾理致陽更泄陰愈涸煩則震動即厥由二氣不能自主之義閲王先生安胃一法最為卓識所參拙見按以兩脈右手澀弱虛象昭然左脈空大按之不實亦非肝氣肝火有餘皆因氣味過辛散越致二氣造偏茲以病因大旨兼以經義酌方人參茯苓半夏白芍煨姜炒粳米靈樞經云中氣不足溲便為變是崩淋泄瀉皆脾胃欲敗之現症今湯水下咽少頃傾囊湧出豈非胃陽無有失司納物乎奈何業醫者中懷疑惑但圖疲藥待其自安怕遭毀謗耳此症一投柔藥濁升填塞必致脹滿仲景於陽明滿實致慎攻下者恐以太陰之脹誤治耳今舌微紅微渴皆是津液不肯升揚脾弱不主散精四布世豈有面色如白紙尚不以陽氣為首重也耶人參熟於術炙甘草炮姜茯神南棗凡論病先論體質形色脈象以病乃外加於身也夫肌肉微白屬氣虛外似豐溢里真大怯蓋陽虛之體為多濕多痰肌疏汗淋唇舌俱白乾嘔胸痞煩渴引飲由乎脾胃之陽傷殘邪得僭居於中留蓄不解正衰邪熾試以脈之短澀無神論之陽衰邪伏顯然況寒涼不能攻熱清邪便是傷及胃陽之藥今杳不納穀大便漸澀若不急和胃氣無成法可遵所謂攻入之病慮虛其陽參擬一方仍候明眼採擇人參半夏生於術枳實茯苓生薑脈濡弱左脅下久有聚氣納食釀積於胃脘之中兩三日嘔逆吞酸積物上湧吐出此皆怫怒動肝肝木犯胃胃中陽傷不能傳及小腸遂變化失司每七八日始一更衣為胃氣不主下行故也法當溫胃陽制肝逆宿病久纏恐多反復致成反胃之症淡附子淡乾薑薑汁生白芍淡吳萸白粳米寒熱邪氣擾中胃陽大傷酸濁上湧吐出脘痛如剌無非陽衰陰濁上僭致胃氣不得下行高年下元衰憊必得釜底暖蒸中宮得以流通擬用仲景附子瀉心湯通陽之中原可泄熱開導煎藥按法用之人參熟附子淡乾薑川連炒半夏枳實茯苓壯年形偉脈小濡惡聞穢氣食入嘔噦緣陽氣微弱濁陰類聚口鼻受汙濁異氣先入募原募原是胃絡分布以上逆而為嘔吐此病理標者用芳香闢穢扶正氣治本以溫上通陽藿香草果公丁香茯苓厚朴砂仁殼廣皮蓽茇少腹屬肝肝厥必犯陽明胃腑故作痛嘔二年來病人已不知因何起病醫徒見病圖治想肝腎必自內傷為病久則奇經諸脈交傷經謂衝脈動而諸脈交動也議溫通柔潤劑從下焦虛損主治淡蓯蓉干茯苓當歸杞子炒沙苑肉桂心知飢能納忽有氣衝涎沫上湧脘中格拒不堪容物內經謂肝病吐涎沫丹溪云上升之氣自肝而出木火上凌柔金受克咳嗆日加治以養金制木使土宮無戕賊之禍滋水制火令金髒得清化之權此皆老年積勞致傷豈攻病可效蘇子麥冬枇杷葉杏仁北沙參桑葉丹皮降香竹瀝噎膈向來翻胃原可撐持秋季驟加驚擾厥陽陡升莫制遂廢食不便消渴不已如心熱嘔吐涎沫五味中喜食酸甘肝陰胃汁枯槁殆盡難任燥藥通關胃屬陽土宜涼宜潤肝為剛臟宜柔宜和酸甘兩濟其陰烏梅肉人參鮮生地阿膠麥冬汁生白芍老年血氣漸衰必得數日大便通爽然後脘中納食無阻此胃汁漸枯已少胃氣下行之旨噎症萌矣病乃操持太過身中三陽燔燥爍津所致故餌藥未能全功議用丹溪法麥冬汁鮮生地汁柏子仁汁甜杏仁汁黑芝麻汁杜蘇子汁松子仁漿勞心勞力經營向老自衰平日服餌桂附生薑三十年病噎不食下膈吐出此在上焦之氣不化津液不注於下初病大便艱澀按經云味過辛熱肝陽有餘肺津胃液皆奪為上燥仿嘉言清燥法麥冬麻仁鮮生地甜水梨桑葉石膏生甘草脈弦而小澀食入脘痛格拒必吐清涎然後再納視色蒼眼筋紅黃昔肥今瘦云是鬱怒之傷少火皆變壯火氣滯痰聚日擁清陽莫展脘管窄隘不能食物噎膈漸至矣法當苦以降之辛以通之佐以利痰清膈莫以豆蔻沉香劫津可也川黃連杏仁桔梗土栝蔞皮半夏橘紅竹瀝薑汁吐蛔凡蛔蟲上下出者皆屬厥陰乘犯陽明內食入胃嘔吐痰涎濁沫如仲景厥陰篇中先厥後熱同例試論寒熱後全無汗解謂至陰伏邪既深焉能隔越諸經以達陽分閲醫藥方初用治肺胃後用溫膽茯苓飲但和胃治痰致深伏厥陰之邪未達前進瀉心湯苦可去濕辛以通痞仍在上中服後胸中稍舒逾時稍寐寐後嘔吐濁痰有黃黑之形大凡色帶青黑必系胃底腸中逆湧而出老年衝脈既衰所謂衝脈動則諸脈皆逆自述嘔吐之時周身牽引直至足心其陰陽蹺維不得自固斷斷然矣仲景於半表半里之邪必用柴芩今上下格拒當以桂枝黃連湯為法參以厥陰引經為通理之使俾沖得緩繼進通補陽明此為治厥陰章旨也淡乾薑桂枝川椒烏梅川連細辛茯苓瘧來得汗陰分之邪已透陽經第痰嘔雖未減青緑形色亦不至最屬可喜舌心白苔未淨舌邊漸紅而神倦困憊清邪佐以輔正一定成法人參半夏茯苓枳實汁乾薑川連脈沉弦腹痛嘔吐鼻煤舌絳面帶青晦色夏秋伏暑發熱非冬月乃誤表禁食胃氣受傷致肝木上干胃土蛔蟲上出遂成重病常而厥逆之慮擬進泄肝和胃得痛止嘔緩冀有轉機川椒川連烏梅乾薑人參茯苓生白芍川楝子痛勞力氣泄陽傷胸脘痛發得食自緩已非質滯停蓄然初病氣傷久泄不止營絡亦傷古謂絡虛則痛也攻痰破氣不去病即傷胃致納食不甘噯噫欲嘔顯見胃傷陽敗當以辛甘溫方人參桂枝茯苓炙草煨姜南棗經幾年宿病病必在絡痛非虛症因久延體質氣餒遇食物不適或情懷鬱勃痰因氣滯氣阻血瘀諸脈逆亂頻吐汙濁而大便反祕醫見身體肢冷認為虛脫以理中和附子溫里護陽夫陽氣皆屬無形況乎病發有因決非陽微欲脫憶當年病來宛是肝病凡疏通氣血皆效其病之未得全好由乎性情食物居多夏季專以太陰陽明通劑今痛處在脘久則瘀濁復聚宜淡味薄味清養初三竹瀝泛丸仍用早上另立通瘀方法蘇木人參鬱金桃仁歸尾柏子仁琥珀茺蔚紅棗肉丸宿病沖氣胃痛今飽食動怒痛發嘔吐是肝木侵犯胃土濁氣上踞脹痛不休逆亂不已變為先寒後熱煩燥面赤汗泄此為厥象厥陰肝臟之現症顯然在目夫痛則不通通字須究氣血陰陽便是著診要旨矣議用瀉心法乾薑川連人參枳實半夏薑汁胃痛久而屢發必有凝痰聚瘀老年氣衰病發日重乃邪正勢不兩立也今納物嘔吐甚多味帶酸苦脈得左大右小蓋肝木必侮胃土胃陽虛完穀而出且厄逆沃以熱湯不減其胃氣掀騰如沸不嗜湯飲飲濁彌留脘底用藥之理遠柔用剛嘉言謂能變胃而不受胃變開得上關再商治法紫金丹産後三年經水不轉胃痛得食必嘔汗出形寒腰左動氣閃爍大便七八日始通脈細弦右澀舌白稍渴脘中響動下行痛緩病屬厥陰順承陽明胃土久傷肝木愈橫法當辛酸兩和厥陰體用仍參通補陽明之陽俾濁少上僭痛有緩期人參開口吳萸生白芍良薑熟半夏雲茯苓天癸當絶仍來昔壯年已有頭暈七年前秋起胃痛若嘈今春悲哀先麻木頭眩痛發下部膝脛冷三日病屬肝厥胃痛述痛引背脅是久病絡脈空隙厥陽熱氣因情志鬱勃拂逆氣攻乘絡內風旋動襲陽明致嘔逆不能進食九孔石決明清阿膠生地枸杞子茯苓桑寄生川石斛痛在脅肋遊走不一漸至痰多手足少力初病兩年寢食如常今年入夏病甚此非臟腑之病乃由經脈繼及絡脈大凡經主氣絡主血久病血瘀瘀從便下諸家不分經絡但忽寒忽熱宜乎無效試服新絳一方小效乃絡方耳議通少陽陽明之絡通則不痛矣歸鬚炒桃仁澤蘭葉柏子仁香附汁丹皮穿山甲乳香沒藥診脈動而虛左部小弱左脅疼痛痛勢上引得食稍安此皆操持太甚損及營絡五志之陽動擾不息咽乾舌燥心悸久痛津液致傷也症固屬虛但參朮歸耆諸方未能治及絡病內經肝病不越三法辛散以理肝酸泄以潤肝甘緩以益肝宜辛甘潤溫之補蓋肝為剛臟必柔以濟之自臻效驗耳炒桃仁柏子仁新絳歸尾橘紅琥珀古人治脅痛法有五或犯寒血滯或血虛絡痛或血著不通或肝火抑鬱或暴怒氣逆皆可致痛今是症脈細弦數不舒此由肝火抑鬱火鬱者絡自燥治法必當清潤通絡土栝蔞炒香桃仁歸身新絳炒白芍炙甘草詢左脅下每日必有小痛逾時其痛勢布散胸臆背部從來不延及於腹中下焦是腑絡為病凡久病從血治為多今既偏患於上仍氣分之阻而致水飲瘀濁之凝此非守中補劑明甚但攻法必用丸以緩之非比驟攻暴邪之治當用穩法議以陽明少陽方法俾樞機開闔舒展諒必有稗益矣生鉤藤生香附風化硝炒半夏茯苓生白蒺藜竹瀝薑汁泛丸診脈右弦左小弱澀病起積勞傷陽操持索思五志皆逆而肝為將軍之官謀慮出焉故先脅痛晡暮陽不用事其病漸劇是內傷症乃本氣不足日餌辛燥氣泄血耗六味滋柔膩藥原非止痛之方不過矯前藥之謬而已內經肝病三法治虛亦主甘緩蓋病既久必及陽明胃絡漸歸及右肝胃同病人臥魂藏於肝夢寐紛紜傷及無形矣議用甘藥少佐攝鎮人參棗仁茯神炙草柏子仁當歸龍骨金箔桂圓肉煮濃汁搗丸小便自利大便黑色當臍腹痛十五年漸發日甚脈來沉而結澀此鬱勃傷及肝脾之絡致血敗瘀留勞役動怒宿疴乃發目今冬深閉藏忌用攻下議以辛通潤血所謂通則不痛矣桃仁桂枝木穿山甲老薤白阿魏丸腹痛三年時發時止面色明亮是飲邪亦酒濕釀成因怒左脅有形痛繞腹中及胸背諸俞乃絡空飲氣逆攻入絡食辛熱痛止復痛蓋怒則鬱折肝用惟氣辛辣可解論藥必首推氣味粗桂枝木天南星生左牡蠣真橘核川楝子肉李根東行皮脈小澀久因悒鬱脘痛引及背脅病入血絡經年延綿更兼茹素數載陽明虛餒肩臂不舉倉猝難於奏效是緩調為宜議通血絡潤補勿投燥熱劫液歸鬚柏子仁桂枝木桃仁生鹿角片薑黃頭風右偏頭痛鼻竅流涕仍不通爽咽喉疳腐寤醒肢冷汗出外邪頭風已留數月其邪混處精華氣血咸為蒙閉豈是發散風寒可解頭巔藥餌務宜清揚當剌風池風府投藥仍以通法莫非氣血周行焉望卻除宿病西瓜衣鮮蘆根苡仁通草蠟礬丸頭形象天義不受濁今久痛有高突之狀似屬客邪蒙閉清華氣血然常餌桂附河車亦未見其害思身半以上屬陽而元首更為陽中之陽大凡陽氣先虛清邪上入氣血瘀痹其痛流連不息法當宣通清陽勿事表散以艾𤋲烙按法灸治是一理也熟半夏北細辛炮川烏炙全蠍薑汁陽氣為邪所阻清空機竅不宣考周禮採毒藥以攻病藉蟲蟻血中搜逐以攻通邪結乃古法而醫人忽略者今痛滋腦後心下嘔逆厥陰見症久病延虛攻邪須兼養正川芎當歸半夏薑汁炙全蠍蜂房溫熱風溫從上而入風屬陽溫化熱上焦進肺肺氣不得舒轉周行氣阻致身痛脘悶不飢宜微苦以清降微辛以宣通醫謂六經輒受羌防泄陽氣劫胃汁溫邪忌汗何遽忘之杏仁香豉鬱金山梔栝蔞皮蜜炒橘紅勞倦嗔怒是七情內傷而溫邪感觸氣從口鼻直自膜原中道蓋傷寒陽症邪自太陽次第傳及至於春溫夏熱則鼻受氣肺受病口入之氣竟由脘中所以原有手經見症不比傷寒足六經之病也其原不同治法亦異仲景論溫邪不可發汗汗則劫津傷陰身必灼熱一逆尚引日再逆促命期又云鼻息鼾語言難出劇則驚癇瘛瘲無非重劫津液所致今病發熱原不是太陽客邪見症所投羌防辛溫表汗此誤即為逆矣上竅不納下竅不便亦屬常事必以攻下希圖泄熱殊不知強汗劫津而傷陽妄下劫液更亡陰頃診脈兩手如搐而戰舌乾燥而無苔前板齒乾目欲瞑口欲開周身燈照而淡晦斑紋隱隱約約幾日來時有厄逆因胃乏穀氣而中空肝陽衝突上冒肆虐耳為今返正先與糜粥使胃中得濡厥陽不致上冒而神昏之纍可已進藥之理甘溫可以生津除熱即斑疹亦不足慮觀仲景論中邪少虛多陰液陽津並涸者復脈湯主之謹仿此義炙甘草人參生地白芍阿膠麥冬溫邪有升無降經腑氣機交逆營衛失其常度為寒熱津液日耗渴飲不飢陽氣獨行則頭痛面赤是皆冬春驟暖天地失藏人身應之患此者最多考古人治溫病忌表誤投即為劫津逆傳心包最怕神昏譫語妄狂治病以辛甘涼潤為主蓋傷寒入足經溫邪入手經也上潤則肺降不致膹郁胃熱下移知飢渴解矣嫩竹葉桑葉杏仁蔗汁麥冬生甘草石膏久患虛損原寢食安舒自服陰柔膩補不但減食不寐脘中常悶渴欲飲涼此口鼻吸入溫邪先干於肺誤補則邪愈熾氣機阻塞弱質不敢開泄援引清揚肅上兼以威喜丸淡以和氣上焦得行可用養胃法白沙參苡仁天花粉桑葉鬱金威喜丸積勞傷陽衛疏溫邪上受內入乎肺肺主周身之氣氣窒不化外寒似戰栗其溫邪內郁必從熱化今氣短胸滿病邪在上大便瀉出稀水肺與大腸表裡相應亦由熱迫下泄耳用辛涼輕劑為穩杏仁枯梗香豉橘紅枳殼薄荷連翹茯苓溫邪中自口鼻始而入肺為咳喘繼傳膻中則嗆血乃心營肺衛受邪然邪在上焦壅遏阻氣必聚為熱痰臭嗆渴是欲內閉惜不以河間三焦立法或謂傷寒主六經或謂肺癰或泄氣血致熱無出路胸突腹大危期至速矣即有對症藥餌氣湧沸騰勢必湧吐無餘焉望有濟夫溫熱穢濁填塞內竅神識昏迷脹悶欲絶者須以芳香宣竅佐牛黃金箔深入臟絡以收錮閉之邪今危篤若此百中圖一而已紫雪丹仲景云陰氣先傷陽氣獨發不寒疸熱令人消爍肌肉條例下不注方但曰以飲食消息之後賢謂甘寒生津解煩熱是矣今脈數舌紫渴飲氣分熱邪未去漸次轉入血分斯甘寒清氣藥中必佐存陰為法中之法生地石膏生甘草知母粳米竹葉心白芍溫邪逆傳膻中熱痰蔽阻空竅所進寒涼消導徒攻腸胃毫無一效痰乃熱熏津液所化膻中乃空靈之所是用藥之最難至寶丹芳香通其神明之竅以驅熱痰之結極是但稚年受溫邪最易虧陰津耗必兼滋清以理久伏溫邪為正犀角鮮生地元參連翹心丹皮石菖蒲至寶丹腹滿已久非是暴症近日面頷腫脹牙關緊閉先有寒熱隨現是象診脈右搏數左小乃溫邪觸自口鼻上焦先受氣血與熱膠固致清竅不利倏有痹塞之變理當先治新邪況頭面咽喉結邪必辛涼輕劑以宣通若藥味重濁徒攻腸胃矣仿東垣普濟消毒意連翹牛蒡子馬勃射干滑石夏枯草金銀花露金汁脈左數右緩弱陽根未固陰液漸涸舌赤微渴喘促自利溲數晡刻自熱神煩囈語夫溫邪久伏少陰古人立法全以育陰祛熱但今見症陰分固有伏邪真陽亦不肯收納擬仿劉河間濁藥輕投不為上焦熱阻下焦根蒂自立冀其煩躁熱蒸漸緩熟地炭茯苓淡蓯蓉遠志炭川石斛五味子豐腴體質適值過勞陽氣受傷嘔吐食物無頭痛身熱已非外感風寒而間日煩躁渴飲唇焦舌黑是內伏熱氣由募原以流布三焦亦如瘧邪分爭營衛者然然有年積勞既久伏邪客病本輕脈小緩按之不無鼓擊可為徵驗且二便頗通略能納穀焉有停滯積聚仲景於疸熱無寒之條不出藥方但曰以飲食消息後賢參聖意甘寒以養胃陰其熱自解要知表散之辛溫消滯之苦溫以及苦寒沉降多犯聖訓戒律矣鮮生地甜杏仁麥冬花粉竹葉心青蔗汁連翹夏季溫熱上受首先入肺河間主三焦極是今世醫者初用非發散即消食散則耗氣消則劫胃究竟熱蘊未除而胃汁與肺氣皆索故不飢不食不便上脘似格似阻酸濁之氣皆是熱化病延多日苦寒難以驟進先擬開提上焦氣分蘇子杏仁土栝蔞皮枇杷葉黃芩降香疫毒癍疹朱某疫癘穢邪從口鼻吸受分布三焦瀰漫神識不是風寒客邪亦非停滯里症故發散消導即犯劫津之戒與傷寒六經大不相同今喉痛丹疹舌如朱神躁暮昏上受穢邪逆走膻中當清血絡以防結閉然必大用解毒以驅其穢必九日外不致昏憒冀其邪去正復犀角連翹生地玄參菖薄鬱金銀花金汁暴寒驟加伏熱更熾邪鬱則氣血壅遏痧疹不肯外達痰氣交阻神迷喘促漸入心胞絡中有內閉外脫之憂熱注下迫自利黏膩不爽法當開其結閉消毒解其膻中之壅必得神清方保無變連翹心飛滑石石菖蒲炒金銀花射干通草煎化牛黃丸舌邊赤昏譫早輕夜重斑疹隱現是溫濕已入血絡夫心主血邪干膻中漸至結閉為昏痙之危苦味沉寒竟入中焦消導辛溫徒劫胃汁皆溫邪大禁議清疏血分輕劑以透斑更參入芳香逐穢以開內竅近代喻嘉言申明戒律宜遵也犀角玄參連翹銀花石菖蒲金汁牛黃丸發瘰熱腫獨現正面每遇九十月大發五六月漸愈七八年如是因思夏令陽氣宣越營衛流行無間秋令氣凜外薄氣血凝滯此濕熱漫無發泄乃少陽木火之郁及陽明蘊蒸之濕故上焦尤甚耳法以辛涼佐以苦寒俾陽分鬱熱得疏庶幾發作勢緩夏枯草鮮菊葉苦丁茶鮮荷葉邊羚羊角黑桅皮鬱金苡仁暑暑熱必挾濕吸氣而受先傷於上故仲景傷寒先分六經河間溫熱須究三焦大凡暑熱傷氣濕著阻氣肺主一身周行之氣位高為手太陰經據述病樣面赤足冷上脘痞塞其為上焦受病顯著緣平素善飲胃中濕熱久伏辛溫燥裂不但肺病不合而胃中濕熱得燥熱錮閉下利稀水即協熱下利故黃連苦寒每進必利甚者苦寒以勝其辛熱藥味尚留於胃底也然與初受之肺邪無當此石膏辛寒辛先入肺知母為味清涼為胃之母氣然不明肺邪徒曰生津焉是至理昔孫真人未診先問最不誤事再據主家說及病起兩旬從無汗泄經云暑當汗出勿止氣分窒塞日久熱侵入血中咯痰帶血舌紅赤不甚渴飲上焦不解漫延中下此皆急清三焦是第一章旨故熱病之瘀熱留絡而為遺毒注腑腸而為洞利便為束手無策再論濕乃重濁之邪熱為熏蒸之氣熱處濕中蒸淫之氣上迫清竅耳為失聰不與少陽耳聾同例青蒿減柴胡一等亦是少陽本藥且大病如大敵選藥如選將苟非慎重鮮克有濟議三焦分清治從河間法飛滑石生石膏寒水石大杏仁炒黃竹茹川通草瑩白金汁金銀花露又診脈後腹胸肌腠登現癮疹氣分濕熱原有暗泄之機早間所談餘邪遺熱必兼解毒者為此下午進藥後診脈較大於早晨神識亦如前但舌赤中心甚乾燥身體捫之熱甚於早間此陰分亦被熱氣蒸傷瘦人慮其液涸然痰咯不清養陰藥無往而非膩滯議得早進清膈一劑而三焦熱穢之蓄當用紫雪丹二三匙藉其芳香宣竅逐穢斯涸熱可解濁痰不黏繼此調理之方清營分滋胃汁始可瞻顧其宿垢欲去猶在旬日之外古人謂下不嫌遲非臆說也知母竹葉心連翹心炒川貝犀角元參金汁銀花露紫雪丹又經月時邪脈形小數小為病退數為餘熱故皮腠麩脫氣血有流行之義思食欲餐胃中有醒豁之機皆佳兆也第舌赤而中心黃苔熱蒸既久胃津與陰液俱傷致咽物咽中若阻溺溲尖管猶痛咯痰濃厚宿垢未下若急遽攻奪恐真陰再涸矣此存陰為主而清腑兼之故乳進食物便是助熱惟清淡之味與病不悖自來熱病最怕食後勞復舉世共聞非臆說也細生地元參心知母炒川貝麥冬地骨皮銀花露竹瀝暑必挾濕二者皆傷氣分從鼻吸而受必先犯肺乃上焦病治法以辛涼微苦氣分上焦廓清則愈惜乎專以陶書六經看病仍是與風寒先表后里之藥致邪之在上漫延結錮四十餘日不解非初受六經不須再辨其謬經云病自上受者治其上援引經義以論治病非邪僻也宗河間法杏仁栝蔞皮半夏薑汁白蔻仁石膏知母竹瀝又脈神頗安昨午發疹先有寒戰蓋此病起於濕熱當此無汗肌腠氣窒至膚間皮脫如麩猶未能全泄其邪風疹再發乃濕因戰栗為解一月以來病魔而肌無膏澤瘦削枯槁古謂瘦人之病慮涸其陰陰液不充補之以味然腥膻濁味徒助上焦熱痰無益培陰養液況宿滯未去腸胃氣尚窒鈍必淡薄調理上氣清爽痰熱不至復聚從來三時熱病怕反復於病後之覆當此九仞幸加意留神為上元參心細生地銀花知母生甘草川貝丹皮橘紅竹瀝病幾一月猶然耳聾神識不慧嗽甚痰黏呼吸喉間有音此非傷寒暴感皆夏秋間暑濕熱氣內郁新涼引動內伏之邪當以輕劑清解三焦奈何醫者不曉伏氣為病但以發散消食寒涼清火為事致胃汁消亡真陰盡灼舌邊赤齒板燥裂乃邪留營中有內閉瘛瘲厥逆之變況右脈小數左脈澀弱熱固在裡當此陰傷日下久之再犯亡陰之戒從來頭面皆是清竅既為邪蒙精華氣血不肯流行諸竅失司聰明矣此輕清清解斷斷然也議清上焦氣血之壅為先不投重劑苦寒正仿古人肥人之病慮虛其陽耳連翹心元參犀角鬱金橘紅黑梔皮川貝鮮菖蒲根竹瀝又脈右緩大左弱面垢色已減痰嗽不爽良由胃中津液為辛散溫燥所傷心營肺衛悉受熱焰蒸迫致神呆喘急耳聾清陽阻痹九竅不利首方宣解氣血繼方芳香通竅無形令其轉旋三焦自有專司豈與俗醫但曉邪滯攻擊而已今已獲效當與清養胃陰肺氣體素豐厚陽弱不耐沉寒然深秋冬交天氣降則上焦先受試觀霜露下垂草木皆改異色人在氣交法乎天地兼參體質施治枇杷葉炒黃川貝橘紅鬱金茯苓苡仁三瘧之邪在陰未經向愈春季洞利不食想春雨外濕水穀內聚亦濕即濕多成五泄之謂痍瘡僅泄經隧濕邪而里之濕邪未驅長夏吸受暑邪上蒙清空諸竅咳嗽耳聾的系新邪非得與宿病同日而語連翹飛滑石嫩竹葉荷葉邊汁桑葉杏仁象貝黑山梔奔走氣亂復飲燒酒酒氣辛熱有升無降肺氣膹郁上下不通舌白消渴氣結自胸及腹澼澼自利不爽周身膚腠皆痛汗大出不解無非暑濕熱氣始由肺受漫布三焦群醫消導苦藥但攻腸胃在上痞結仍然議淡滲佐以微辛合乎軒岐上病治上之方西瓜翠衣川白通草大豆黃卷馬兜鈴射干苡仁三伏中陰氣不生陽氣不潛其頭脹身痛是暑邪初受暑濕熱必先傷氣分故舌白口渴身痛早晨清爽午後煩蒸狀如溫瘧沐浴繞動血絡宿病得時邪而來仲景云先治新病後理宿病是亦陰氣先傷陽氣獨發也鮮生地石膏知母元參連翹竹葉心荷葉汁初病伏暑傷於氣分微熱渴飲邪犯肺也失治邪張逆走膻中遂舌絳縮小便忽閉鼻煤裂血口瘡耳聾神呆由氣分之邪熱漫延於血分矣夫肺主衛心主營營衛二氣晝夜行於經絡之間與邪相遇或涼或熱今則入於絡津液被劫必漸昏寐所謂內閉外脫鮮生地連翹元參犀角石菖薄金銀花右脈空大左脈小芤寒熱麻痹腰痛冷汗平素積勞內虛秋暑客邪遂干臟陰致神迷心熱煩躁刮痧似乎略爽病不肯解此非經絡間病頗慮熱深劫陰而為痙厥張司農集諸賢論暑病謂入肝則麻痹入腎為消渴此其明徵議清陰分之邪仍以養正補之阿膠小生地麥冬人參小川連烏梅肉暑由上受先入肺絡日期漸多氣分熱邪逆傳入營遂逼心胞絡中神昏欲躁舌短縮手足牽引乃暑熱深陷謂之發痙熱閉在裡肢體反不發熱熱邪內閉則外脫豈非至意考古人方法清絡熱必兼芳香開里竅以清神識若重藥攻邪直走腸胃與胞絡結閉無干涉也犀角鮮生地連翹鮮菖蒲銀花化至寶丹四丸病已十餘日身尚躁熱舌苔黏膩神呆目定脈剛而數煩躁囈語此暑濕久伏與時氣之穢邪凝合釀成膠膩之痰閉塞清明之府神情迷昧胃家濁液蒸遏不宣藥食甘味必蛔厥上冒然內經有濕位之下燥氣乘之是以從之濕轉為燥若無濕痰之潮氣上蒸舌苔早已燥剌矣今先滋液以清烈焰之燔鮮生地麥冬烏梅蔗漿銀花露羚羊角蚌水又面垢舌白渴飲氣短如喘自利是穢濁氣入口鼻與水穀之氣互相混擾濕氣阻塞氤氳內蒸三焦皆受胸背肢節有晦黯斑紋穢與氣血膠固心絡為邪熏灼神昏囈語手經蔓延疫邪不與傷寒同例法當芳香辟邪參以解毒必不為濕穢蒙閉可免痙厥之害石菖蒲汁白蔻仁犀尖小青皮連翹心金銀花六一散金汁至寶丹又邪陷復利傷及厥陰症見氣上撞心飢不能食乾嘔腹痛全是肝病見端肝為至陰之藏相火內寄仲聖治法不用純剛之劑以肝為剛藏也今正交土旺之時木火為仇五日內未為穩當宜慎之人參淡吳萸當歸白芍秦皮炒烏梅今年七月秋暑未除初病頭痛身熱是暑由上竅傷及清陽醫藥當辛涼取氣同氣相求中上之輕邪自散無如辛溫苦寒清滋之類雜然並投水穀內蒸氤氳不解見症仍在身半以上軀殼之間非關臟腑大病第能蔬食十日可解上焦之郁川芎薄荷荊芥炭炒白芷蔓荊子菊花蒂緑茶煎湯代水中氣索虛貪寒飲冷遏伏暑濕之火蘊於膻中劫津耗液盡從燥化肺氣不能下輸腸胃燥滿不行下之遂逼血下行血既下奪亦云竭矣陰不配陽汗不外泄即為上厥上厥下竭肺經獨受燥纍急進清燥救肺湯以回陰液枇杷葉人參麥冬桑葉阿膠杏仁生石膏竹葉濕病起旬日猶然頭脹漸至耳聾正如內經病能篇所云因於濕首如裹此厄忒鼻衄皆邪混氣之象況舌色帶白咽喉欲閉邪阻上竅空虛之所諒非苦寒直入胃中可以治病病名濕溫不能自解即有昏痙之變醫莫泛稱時氣而已連翹牛蒡子銀花馬勃射干金汁仲景云小便不利者為無血也小便利者血症諦也此症是暑濕氣蒸三焦瀰漫以致神昏乃諸竅阻塞之兆至小腹硬滿大便不下全是濕鬱氣結彼世醫猶然以滋味呆鈍滯藥與氣分結邪相反極矣議用甘露飲法豬苓浙茯苓寒水石晚蠶砂皂莢子厥陰為病必錯雜不一瘧痢之後肝臟必虛發症左脅有痞腹中塊儡外堅脅下每常汨汨有聲惡虛就實常有寒熱胃中不知飢而又𩞄雜吞酸脈長而數顯然厥陰陽明濕熱下滲前陰陽縮而為濕熱症也議用升發陽明胃氣滲泄厥陰濕熱其症自愈蒼朮半夏茯苓橘紅通草當歸柏子仁沙蒺藜川楝子茴香溫瘧初愈驟進濁膩食物濕聚熱蒸蘊於經絡寒戰熱熾骨骱煩疼舌起灰滯之色面目痿黃色顯然濕熱為痹仲景謂濕家忌投發汗者恐陽傷變病蓋濕邪重著汗之不卻是苦味辛通為安耳防己杏仁滑石醋炒半夏連翹山梔苡仁野赤豆皮濕溫長夏最多濕熱鬱蒸之氣由口鼻而入上焦先病漸布中下河間所謂三焦病也治與風寒食積迥異仲景云濕家不可發汗汗之則痙濕本陰邪其中人也則傷陽汗則陽易泄越而邪留不解濕蒸熱鬱發現為黃熏蒸氣隧之間正如罨曲之比斯時病全在氣分連翹赤小豆湯可以奏效今經一月邪彌三焦自耳前後左腫及右癰瘍大發夫癰者壅也不惟氣滯血亦阻塞蒸而為膿穀食不思陡然肉消殆盡胃氣索然矣商治之法補則助壅清則垂脫前輩成法一無可遵因思濕熱穢濁結於頭面清竅議輕可去實之法選芳香氣味使胃無所苦或者壅遏得宣少進漿粥便是進步經云從上病者治其上靈樞云上焦如霧非輕揚芳香之氣何以開之青菊葉荷葉邊金銀花象貝母緑豆皮馬兜鈴連翹射干金汁脈弦緩面目肌膚皆黃舌白滑膩胸脘膈間脹閉病名濕溫由瀕海潮濕氣入口鼻至募原分布三焦此為外因仍食水穀腥物與外入穢濁之邪兩相交混濕甚熱鬱三焦隧道氣血不通遂變黃色發汗不愈者濕家本有汗也清熱消導不愈者熱從濕中而起濕不去則熱不除也夫濕邪無形質攻滯乃有形治法其不效宜矣昔河間治濕熱必取乎苦辛氣寒蓋苦降以逐濕辛香以祛穢寒取乎氣藉氣行不閉塞於內也當世醫者混以傷寒表裡為治殊不知穢濕氣入口鼻遊行三焦不與傷寒同治綿茵蔯白豆蔻厚朴川通草廣皮白茯苓皮半夏曲塊滑石雨濕地蒸潮穢經旬人在氣交之中口鼻吸受從上內侵頭脹脘悶肉刺骨痛蓋肺位最高其氣主周身貫串既被濕阻氣不運通濕甚生熱汗出熱緩少間再熱凡風寒得汗解濕邪不從汗解耳仲景云濕家不可發汗汗之則痙謂濕本陰晦之邪其傷必先及陽故汗下清降消導與濕邪不相干涉也濕也熱也皆氣也能矇蔽周身之氣原無有形質可攻由上不為清理漫延中下二焦非比傷寒六經自表傳裡相同河間暢發此義專以三焦宣通為法明張司農亦以苦辛寒主治總以氣分流利為主氣通則濕解矣今兩旬不愈入暮昏厥厥者逆亂之稱以邪深入至陰之中熱蒸上冒致神明為邪所矇蔽矣初濕邪下注而大便為溏今則氣窒結閉而大便不通古稱熱深厥深又云厥少熱多則病退厥多熱少則病進凡厥多隸厥陰也緑豆野赤豆馬料豆地漿珍珠冰片又暑濕客氣由上受以行中道未按經法致三焦痞塞逆亂為厥厥屬邪深在陰故取地漿重陰清熱珠潛水底鹹寒少佐冰片辛熱能開熱痹直走至陰以冀厥止究竟暑濕熱氣乃無質之邪瀰漫胸臆如煙霧繚繞諸宗氣營氣無以展舒焉有知味知飢彼攻消峻克能滌有形之邪滯非濕結氣分之治也昔軒岐云病從上者治其上且上焦如霧藉輕揚可以去實半月不更衣斷勿攻下皆氣窒使然川貝米仁兜鈴白蔻連翹射干通草中年沖氣痰升喘急隨發隨止從肝腎本病治固是地黃飲子用意在濁藥輕投勿以味厚凝滯痰氣但以質能引導至下變飲為丸純是濁藥柔溫若歸脾湯甘溫守中養脾之營更與痰飲沖逆相背自七月間反復必有暑濕客氣從呼吸而受據述肌膚間發丹疹浮腫甚速腠膜映紅若但內症未必有此思夏秋口鼻受氣上焦先傷與肝腎本病兩途上焦失解理必漫延中下而三焦皆為病藪矣此脹在乎脈絡不在腑腸水穀無礙者緣此況久病大虛溫補不受必當推其至理伏邪引動宿病仲景論必先理其邪且口渴便實豈溫熱相宜自言懷抱鬱結相火內寄肝膽如莖腫囊縱濕壅水漬勉以三焦氣分宣通方仿古二虛一實偏治其實開其一面也飛滑石杏仁茯苓皮厚朴豬苓通草白蔻仁望色萎瘁晦黯聞聲呼吸不利語音若在甕中診脈右緩左急問初病忽熱忽溫頭中如裹腰痛欲拊捫神識呆鈍昏昏欲寐肢節瘛痙咳痰映紅溺溲短縮便溏帶血不飢不渴環口微腫唇乾不紅舌白糜腐此水穀酒腥濕熱相併鬱蒸阻撓清氣之遊行致周身氣機皆令痹塞夫熱邪濕邪皆氣也由募原分布三焦營衛循環升降清濁失司邪屬無形先著氣分時師橫議表邪宜汗里滯宜消見熱投涼殊不知熱由濕鬱氣行熱走仲景於痙暍從濕化忌汗忌下明示後人勿傷陰陽耳但無形之邪久延必致有形由氣入血一定理也據色脈症參之未見或可採用羚羊角茵蔯銀花連翹通草大腹皮茯苓皮豬苓澤瀉至寶丹黃疸心下痛年餘屢發痛緩能食漸漸目黃溺赤此絡脈中凝瘀蘊熱與水穀之氣交蒸所致若攻之過急必變脹滿此溫燥須忌議用河間金鈴子散合無擇穀芽枳實小柴胡湯法金鈴子延胡枳實柴胡半夏黃芩黑山梔穀芽述初病似瘧乃夏暑先伏秋涼繼受因不慎食物胃脘氣滯生熱內蒸變現黃疸乃五疸中之谷疸也溺黃便祕當宣腑濕熱但不宜下恐犯太陰變脹綿茵蔯茯苓皮白蔻仁枳實皮杏仁桔梗花粉面目悉黃微見黑滯煩渴腹滿左脈弦數右脈空大此內傷發黃為厥陰肝木太陰脾土二臟交傷之候也夫肝為風臟其性喜伸而惡屈鬱則木不得伸而屈矣鬱極則其氣盛而風乃發風發必挾其勢以賊脾脾為濕土之司土受克而氣不行則濕勝矣風性雖善行遇濕以留之反壅滯經絡而不解由是濕停陽瘀而煩渴有加其發黃也必矣雖曰風濕所致實由木亢而不寧土困而不舒非外來風濕之比況黑色見於面則知並傷其腎以脾病不行胃中谷氣入腎反將脾中濁氣下流故於黃中見黑滯耳即其腹滿亦是中氣不行虛熱內壅非結熱當下之比若誤下之則藏氣空虛風從內生矣若誤汗之則陽氣外解濕愈不能行矣為商治法平肝之亢扶土之虛兼解鬱熱以清氣道除濕蒸而和中氣人參白朮白芍黃連山梔歸身丹皮茵蔯秦艽柴胡甘草半夏瘧疾瘧疾停藥日有向愈之機胃困則痞閉不欲食今雖未加餐已知甘美皆醒之漸也童真無下虛之理溲溺欲出尿管必痛良由胃津肺汁因苦辛燥熱烈氣味劫奪枯槁腸中無以運行庸醫睹此必以分利所謂泉源既竭當滋其化源九竅不和都屬胃病麥門冬甜水梨皮甜杏仁蔗漿脈數目眥黃舌心乾白黃胎口中黏膩脘中痞悶不思納穀由於途次暑風客邪內侵募原營衛不和致發瘧疾夫暑必兼濕濕也熱也皆氣也氣與邪博則清濁交混升降自阻古稱濕遏必熱自生矣聖帝論病本乎四氣其論藥方推氣味理必苦降辛通斯熱氣痞結可開消導攻滯香燥泄氣置暑熱致病之因於不治不識何解川連黃芩花粉桔梗白蔻仁鬱金橘紅六一散寒來喜飲熱湯發熱後反不渴間瘧已四十日今雖止不飢不思食五味入口皆變初病舌白乾嘔濕邪中於太陰脾絡濕鬱氣滯喜熱飲暫通其鬱邪蒸濕中生熱六腑熱灼津不運行至大便硬祕此為氣濕痹結當薄味緩調今氣分清肅與脾約似同但仲景氣血兼治此病卻專傷氣分炒黃半夏生益智仁綿茵蔯廣皮厚朴茯苓濕熱與水穀交蒸全在氣分嘗稱三焦分消清解既成間日瘧疾邪正互爭原無大害初誤於混指傷寒六經再謬於參朮守補致邪瀰漫神昏喘急妄譫痙搐皆邪無出路內閉則外脫求其協熱下利已不可得診脈細澀按腹膨滿夫脾滿屬氣燥實在血今洞利後而加腹滿諸氣皆結豈須閉塞而然潰敗決裂至此難望挽救細葉菖蒲根汁草果仁茯苓皮紫厚朴綿茵蔯辰砂益元散連翹心金銀花牛黃丸脈小澀病起瘧後食物不和仍誦讀煩勞遂至左脅連及少腹常有厥氣或攻胃脘或聚腹中凝著䐜脹古語云脹不離乎肝膽亦猶咳不離乎肺也蓋肝得邪助木勢張揚中土必然受侮本氣自怯運納之權自滅清陽既少展舒濁陰日踞漸為痞滿上年溫養辛甘久進未見病去其治體之法諒不能卻自述靜處病加煩動小安其為氣血久阻為郁議用通絡法以病根由瘧久邪留絡中耳紫降香桃仁小香附淡姜渣神麯雞肫皮南山楂韭根汁泛丸前議勞傷陽氣當知內損邪陷之理凡女人天癸既絶之後其陰經空乏豈但營衛造偏之寒熱而已故溫脾胃及露姜治中宮營虛但畏寒不知熱為牝瘧蓋牝為陰身體重著亦是陰象此辛甘理陽鹿茸自督脈以煦提非比姜附但走氣分之剛暴驅邪益虛卻在營分難經曰陽維脈為病發寒熱也鹿茸鹿角霜人參當歸潯桂茯苓炙草暑傷氣分上焦先受河間法至精至妙後醫未讀其書焉能治病臻效邪深則瘧來日遲氣結必胸中混悶如痞無形之熱漸蒸有形之痰此消導發散都是劫津無能去邪矣石膏杏仁半夏厚朴知母竹葉脈沉舌白厄忒時時煩躁向系陽虛痰飲瘧發三次即止此邪窒不能宣越並非邪去病解今已變病陰沍痰濁阻塞於中致上下氣機不相維續症勢險篤舍通陽一法無方可擬必得中陽流運瘧症復作庶有愈機淡附子生草果仁生白芍茯苓生厚朴薑汁伏暑冒涼發瘧以羌防蘇蔥辛溫大汗汗多衛陽大傷胃津亦被劫干致渴飲心煩無寐診脈左弱右促目微黃嗜酒必中虛谷少易於聚濕蘊熱勿謂陽傷驟補仿內經辛散太過當食甘以緩之大麥仁炙草炒麥冬生白芍茯神南棗瘧邪田四末以擾中皆陽明厥陰界域陽明衰則厥陰來乘津液少斯內風必動昔賢以瘧屬氣虛本是濕痰敗血今戌亥頻熱行走淋汗顯然液虛陽動風生脂液不得灌溉肢末非濕痰氣分之恙冬桑葉熟首烏黑芝麻柏子仁茯神當歸杞子菊花炭蜜丸瘧已復瘧溺濁淋痛稚年脾瘧食物不慎色黃腹膨有滯脾胃愈衰東垣云中氣不足溲便為變初秋交冬迭加反復久則五疳癆瘵當慎於食物令脾胃氣靈可效宗脾胃論升降疏補法人參茯苓炙草廣皮使君子神麯楂肉麥芽澤瀉閩産陽氣偏泄今年久熱傷元初瘧發散不能去病便是再劫胃陽致邪入厥陰昏冒大汗思肝腎同屬下焦厥陽挾內風冒厥吐涎沫膠痰陽明胃中以寒熱戕擾空虛若谷風自內生閲醫藥不分經辨症但以稱虛道實宜乎鮮有厥效但用仲景安胃泄肝一法人參川椒烏梅附子乾薑桂枝川連生牡蠣生白芍舌白不大渴寒戰後熱神躁欲昏而心胸飽悶更甚瘧系客邪先由四肢以擾中宮痰涎嘔逆顯是肺胃體虛邪聚閉塞不通故神昏煩躁鬱蒸汗泄得以暫解營衛之邪未清寒熱漫延無已此和補未必中竅按經設法為宜白蔻仁大杏仁焦半夏薑汁黃芩淡竹葉脈微弱而細鼻準獨明晝日形冷汗泄不飢少納脘腹常痞泄氣自舒此陽氣失護衛而寒栗汗出陽失鼓運而脾胃氣鈍前進養營亦主中宮想因血藥柔耎陽不驟蘇初進甚投接用則力疲矣詢其不喜飲湯舌頗明潤非邪結客熱之比議用理中湯法專以脾胃陽氣是理不獨治病兼可轉運日前之藥昔賢以瘧稱為脾寒重培生陽使中州默運實治法之要旨人參生芍白朮附子茯苓乾薑瘧有十二經然不離少陽厥陰此論客邪之傷若挾怫鬱嗔怒致厥陽肝氣橫逆其勢必鋭經言肝脈貫膈入胃上循喉嚨而瘧邪亦由四末擾中故不飢不食胃受困也夫治病先分氣血久發頻發之恙必傷及絡絡乃聚血之所久病必瘀閉香燥破血凝滯滋血皆是症之禁忌也切宜凜之青蒿生鱉甲炒桃仁當歸尾鬱金橘紅茯苓瘧後耳竅流膿是竅閉失聰留邪與氣血混為扭結七八年之久清散不能速效當忌葷酒濁味臥時服茶調散一錢患耳中以甘遂削尖插入耳內銜甘草半寸許兩年前晨泄食入嘔吐此非有年體質之脾腎虛瀉可以二神四神治也蓋幼衝陽虛百中僅一耳今瀉泄仍然寒熱咳嗽失血月事不來脈得弦數形色消奪全是沖年陰不生長勞怯大著無見病治病之理保其胃口以冀經通務以情懷開爽為要勿恃醫藥卻病熟地炭炒當歸炙甘草炒白芍淡黃芩烏梅肉黑楂肉痢痢將兩月目微黃舌白口乾唇燥赤腹滿按之軟竟日小便不通病者自述肛門窒塞努掙不已僅得迸出黏積點滴若有稀糞自必傾腸而多思夏秋間暑濕內著為痢軒岐稱曰滯下謂滯著氣血不獨食滯一因凡六腑屬陽以通為用五臟為陰藏蓄為體先瀉後痢脾傳腎則逆即土剋水意然必究其何以傳克之由蓋伏邪垢滯從中不清因而下注矣遷延日久正氣因虛仲景論列三陰至太陰篇中始挈出腹滿字樣脾為柔臟惟剛藥可以宣揚驅濁但今二腸窒痹氣不流行理中等法決難通腑考內經二虛一實者治其實開其一面也然必溫其陽佐以導氣逐滯欲圖扭轉機關舍此更無他法製附子生厚朴木香製大黃炒黑大茴舌白渴不欲飲心腹熱每痢必痛肛墜痢又不爽微嘔有痰口味有變頭中空痛兩頰皆赤此穀氣蒸濕熱鬱於腸胃清濁交混忽加煩躁難鳴苦況法當苦寒泄熱辛香流氣滲泄利濕蓋積滯有形濕與熱本無形質耳川連黃芩鬱金厚朴豬苓槐米秦皮夏秋痢疾固是濕熱傷氣脾胃氣滯後重裡急不爽古方香連丸取其清裡熱必佐理氣謂氣行斯濕熱積聚無容留矣知母生地滋陰除熱治陰分陽亢之火與痢門濕熱大異蓋滋則呆滯氣鈍窒塞宜乎欲便不出究竟濕熱留邪仍在附桂熱燥又致肛墜痛如刀割理中益氣東垣成法僅僅升舉下焦清陽未能直透腸中再用大黃重藥兼知母生地等味更令傷及下焦書義謂諸痢久都屬腎傷小腹墜忌冷顯然是下症議用升陽亦須下治人參茯苓澤瀉炙草防風根羌活細辛生薑大棗暑必挾濕傷在氣分古稱滯下此滯字非停滯飲食言暑濕內侵腑中流行阻遏而為滯矣消導升舉溫補暑邪無有出路胸痞不飢不食黏膩未已而肛門沉墜里結三焦皆受邪蒸上下渾如兩截延為休息痢疾纏綿展轉豈旦晚驟愈之病淡乾薑生薑小川連人參枳實瀉痢兩月肢高浮腫高年自屬虛象但胸脘痞悶納穀噁心每利必先腹痛是夏秋暑熱鬱滯於中虛體挾邪焉有補澀可去邪扶正之理恐交節令變症明是棘手重症矣人參茯苓川連淡乾薑生白芍枳實脈右數左細數面垢舌燥白苔點點肌膚甲錯左脅動氣伏暑當秋涼而發初病如瘧當從苦辛寒法里邪熾烈變為下痢胃津液劫陰液大耗昔賢於熱病受涸急以救陰為務苟胃關得蘇漸以冀安否則犯喻氏所指客邪內陷液枯致危之戒矣人參生地烏梅炙草麥冬木瓜瀉痢起於長夏醫謂時令濕熱胃苓湯芩芍法固非謬訛因高年腎陽肝陰先虧使客氣內擾阻遏中流乏砥柱坐鎮致狂瀾滔天耳病經兩旬不減重陰無陽驗諸神識甚清其外邪為少而內損為多八脈無權下無收攝漏卮不已理必生陽泄下焦冷此皆陰陽二氣絶微治病則夯治本則宜非置之不理實究天人而已人參鹿茸炒黑當歸生杜仲生沙苑茯苓初起無寒熱即瀉痢嘔惡不食乃噤口痢重病夫暑邪之傷由口鼻吸氣而入邪與水穀交混蒸變濕熱釀為積滯膿血腸胃氣窒欲解不能通爽遂致裡急後重香連苦辛理氣導濕清熱初用頗是皆緣勞碌之人非膏粱溫養之質淡薄積勞中氣易傷四十日來積少痛緩醫稱病解而食不下咽不知飢飽診得脈弦形衰舌白不渴飲水日瀉數行全是胃倒氣奪中宮損極下關不攝谷不能咽焉能承受湯藥藥味氣劣胃衰必惡久痢久瀉務在能食古人非醒脾胃即安腎攝納再詢粉漿下咽或嗆或噎議以上脘宜通其清陽下焦當固其滑脫仿古方中參苓白朮散末當以米飲日服二次間以不膩滑之物食些少勿多以示胃之所喜為補必須胃氣漸蘇方可轉危為安人參焦術茯苓炙草炒扁豆苡仁桔梗砂仁炮薑炭肉豆蔻邪陷瘧後變痢傷及厥陰症見氣上撞心飢不能食乾嘔腹痛全是肝病肝為至陰之臟相火內寄仲景治法不用純剛燥熱之藥以肝為剛臟故也今正交土㮁土木為讎五日內未為穩當人參炒當歸炒白芍炒烏梅肉茯苓淡吳萸生香附汁真北秦皮當年痢久用三神丸得效是脾腎兩困兼由氣分之滯體質陽虛遇冷病加今病起長夏小水不通必系夏熱阻其宣化久則氣血凝著而為腸紅先與桂苓甘露飲分消其濕於術茯苓豬苓澤瀉滑石桂心泄瀉平素操持積勞五志之火易燃上則鼻竅堵塞下有肛痔漏紅冬春溫邪是陽氣發越邪氣乘虛內伏夫所伏之邪非比暴感發散可解況兼勞倦內傷之體病經九十日來足跗日腫大便日行五六次其形黏滯其色黃赤紫膩小便不利必隨大便而稍通此腎關樞機已廢二腸陽腑失司所進水穀脾胃不主運行釀濕墜下轉為瘀腐之形正當土旺入夏脾胃主氣此濕氣內淫由乎脾腎日傷不得明理之醫一誤再誤必致變現腹滿矣夫左脈之緩澀是久病陰陽之損是合理也而右脈弦大豈是有餘形質之滯即仲景所云弦為胃減大則病進亦由陽明脈絡漸弛腫自下而上之義守中治中有妨食滋滿之弊大旨中宜運通下宜分利必得小溲自利腑氣開闔始有轉機若再綿延月餘夏至陰生便難力挽矣四苓加椒目厚朴益智廣皮白三瘧劫截不效必是陰臟受病衄血熱渴食入不化痛瀉二者相反思病延已久食物無忌病中勉強進食不能充長精神即為滯濁阻痹先以脹瀉調理不必以瘧相混草果厚朴陳皮木香茯苓皮大腹皮豬苓澤瀉經營勞心納食違時飢飽勞傷脾胃受病脾失運化夜屬陰晦至天明洞瀉黏膩食物不喜脾弱惡食柔濁之味五苓通膀胱分泄濕氣已走前陰之竅用之小效東垣謂中氣不足溲便為變陽不運行濕多成五泄矣人參生白朮茯苓炙草炮姜肉桂脈沉緩肌肉豐盛是水土稟質陽氣少於運行水穀聚濕布及經絡下焦每有重著病痛食稍不運便易泄瀉經水色淡水濕交混總以太陰脾臟調理若不中竅恐防脹病人參茯苓白朮炙草廣皮羌活獨活防風澤瀉晨泄難忍臨晚稍可寧安易飢善食仍不易消磨其故在乎脾胃陰陽不和也讀東坦脾胃論謂脾宜升則健胃而降則和援引升降為法人參生於術炮附子炙草炒歸身炒白芍地榆炭煨葛根煨升麻炮姜灰能食不化腹痛泄瀉若風冷外乘肌肉著冷其病頃刻即至上年用膏石安腎丸初服相投兩旬不效知是病在中焦不必固下矣自述行走數十里未覺衰倦痛處繞臍議用治中法足太陰陽明主治生於術生茅朮生益智淡乾薑胡蘆巴茯苓木瓜蓽茇便閉脾宜升則健胃宜降則和蓋太陰之土得陽始運陽明之土得陰自安以脾喜剛燥胃喜柔潤仲景急下存津治在胃也東垣大升陽氣治在脾也今能食不運醫家悉指脾弱是病但診脈較諸冬春盛大兼弦據經論病獨大獨小斯為病脈脾臟屬陰胃肺屬陽脈見弦大非臟陰見病之象久病少餐猶勉強支撐兼以大便窒塞泄氣不爽坐談片刻噯氣頻頻平素痔瘡腸紅未嘗安適此脈症全是胃氣不降腸中不通腑失傳導變化之司古人云九竅不和都屬胃病六腑為病以通為補經年調攝不越參朮桂附而毫乏應效不必再進湯藥議仿丹溪小溫中丸服至七日俾三陰三陽一周再議治之小溫中丸湯食下咽噯噫不已不飢不食大便乾堅若彈丸大凡受納飲食全在胃口已經胃逆為病加以嗔怒其肝木之氣貫膈犯胃斯病加劇況平昔常似有形骨梗脈得左部弦實氣鬱血結甚肖進商辛潤方法桃仁冬葵子皂莢核郁李仁大黃降香鬱金服鹹苦入陰大便仍閉澀針剌一次病無增減可謂沉錮之疾夫病著深遠平素飲酒厚味釀濕聚熱漬筋爍骨既已經年不拔區區湯液焉能通逐議以大苦寒堅陰燥濕方法參入酒醴引導亦同氣相求之至理黃柏茅朮生大黃乾地龍金毛狗脊川連萆薢晚蠶砂穿山甲漢防已仙靈脾海金沙川獨活北細辛油松節白茄根黃酒燒酒各半浸七日陽明脈大環跳尻骨筋掣而痛痛甚足筋皆縮大便燥艱常祕此老年血枯內燥風生由春升上僭下失滋養昔喻氏上燥治肺下燥治肝蓋肝風木橫胃土必衰陽明諸脈不主束筋骨流利機關也用微咸微苦以入陰方法鮮生地阿膠天冬人中白川斛寒水石肝血腎液久傷陽不潛伏頻年不愈傷延脾腑由陰乾及乎陽越人且畏凡肝體剛腎惡燥問大便五六日更衣小溲時間淋濁尤非呆滯補澀所宜炒杞子沙苑天冬桂拌酒白芍茯苓豬脊筋少腹微脹小便通利方安大便三四日一通而燥堅殊甚下焦諸病須推肝腎腑絡必究幽門二腸閲所服藥是香砂六君以治脾不知腎惡燥耳當歸蓯蓉郁李仁冬葵子牛膝小茴茯苓車前蜜丸五竅先起咳嗽繼而耳聤脹痛延綿百日不愈此體質陰虛觸入風溫未經清理外因傷及陰分少陽相火陡起故入暮厥痛愈劇當先清降再議育陰苦丁茶鮮菊葉金銀花生緑豆皮川貝母鮮荷葉梗益元散因大聲喊叫至右耳失聰想外觸驚氣內應肝膽膽脈絡耳震動其火風之威亦能鬱而阻竅治在少陽忌食腥濁青蒿葉青菊葉薄荷梗連翹鮮荷葉汁苦丁茶腎開竅於耳心亦寄竅於耳心腎兩虧肝陽亢逆故陰精走泄陽不內依是以耳鳴時閉但病在心腎其原實由於郁鬱則膽陽獨亢令肝火上炎清晨服丸藥以補心腎午服湯藥以清少陽以膽經亦絡於耳也水煮熟地麥冬龜板牡蠣白芍北味建蓮磁石茯神沉香辰砂丸服夏枯草丹皮生地山梔女貞子赤苓生甘草煎服腎竅開耳膽絡脈亦附於耳凡本虛失聰治在腎邪干竅閉治在膽乃定例也今年已六旬脈形細數皆是腎陰久虧肝陽內風上旋蒙竅五行有聲多動真氣火風然非苦寒直降可效填陰重鎮滋水制木佐以鹹味入陰酸以和陽藥理當如是議熟地龜板鎖陽牛膝遠志茯神磁石秋石吳萸五味高年目暗已久血絡空虛氣熱乘其空隙攻觸脈絡液盡而痛當夜而甚乃熱氣由陰而上想外科用酒調末藥必系溫散攻堅因此而痛虛症可知羚羊角連翹心夏枯草青菊葉全當歸川桂枝丹皮頭面諸竅皆清陽遊行之所邪處於中則為堵塞陽氣不司流行必畏寒形頽內痹必鬱而成熱有鼻柱鼽衄矣論理當用通聖散遠處江外倉猝就診不可輕投用輕可去實苦丁茶乾荷葉邊蔓荊子連翹心飛滑石白芷素有痰火氣逆春令地中陽升木火化風上引巔頂腦熱由清竅以泄越耳鳴鼻淵甚於左者春應肝膽氣火自左而升也宜清熱散郁辛涼達於頭而主治羚羊角黑山梔苦丁茶青菊葉飛滑石夏枯草花性情躁急陽動太過氣火上升鬱於隧竅由春深加病失其調達之性經言春氣病在頭也考五行六氣迅速變化莫若火風腦熱暗泄而為鼻淵隧道失和結成癭核夫東垣升陽散火丹溪總治諸郁咸取苦辛為法然藥乃片時之效得能久安以怡悅心志為要旨耳連翹心土貝母海藻昆布黑山梔川芎小生香附鬱金羚羊角夏枯草乾荷葉邊青菊葉汁泛丸苦丁茶煎湯送形瘦尖長稟乎木火陰精不足腦髓不固鼻淵淋下並不腥穢暖天稍止遇冷更甚其為虛證顯然明白醫者愈以風寒中腦主治發散滲泄愈耗正氣豈但難愈勞怯是憂用天真丸人參黃耆白朮山藥蓯蓉當歸天冬羊肉咽喉痛痹發時如有物阻隔甚至痛連心下每晚加劇是陰液日枯肝臟厥陽化火風上灼法以柔劑仿甘以緩其急耳細生地天冬阿膠生雞子黃元參心糯稻根鬚陰涸於下陽熾於上為少陰喉痛乃損怯之末傳矣用豬膚甘涼益坎有情之屬而效今肉腠消爍殆盡下焦易冷髓空極矣何暇以痰嗽為理議滑澀之補味鹹入腎可也牛骨髓羊骨髓豬骨髓麋角膠建蓮肉山藥芡實搗丸
